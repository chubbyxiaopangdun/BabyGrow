version: '3.8'

services:
  babygrow:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./backend/data:/app/backend/data
    environment:
      - PORT=8765
      - AI_PROVIDER=minimax
      # - AI_API_KEY=your_api_key_here
      # - AI_BASE_URL=https://api.minimax.chat/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
