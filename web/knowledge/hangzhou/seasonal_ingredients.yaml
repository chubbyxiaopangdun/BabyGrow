# 杭州四季食材日历 v1.0
# 来源：结合浙江本地食材习惯 + 现代生鲜供给
version: 1.0

spring:
  months: [3, 4, 5]
  local_produce:
    - name: 春笋
      category: 蔬菜
      months: [3, 4]
      best: 3月中-4月中
      storage: 冷藏3天
      notes: 现挖现吃最嫩，浙西山区产的最好
    - name: 蚕豆
      category: 蔬菜
      months: [4, 5]
      best: 4月
      storage: 冷藏5天
      notes: 2岁宝宝可吃，需去皮
    - name: 草莓
      category: 水果
      months: [3, 4, 5]
      best: 3-4月
      storage: 冷藏2天
      notes: 建德奶油草莓品质好，过敏风险低
    - name: 青团
      category: 传统食品
      months: [3, 4]
      best: 清明前后
      storage: 常温1天
      notes: 艾草制作，2岁可少量尝试
    - name: 螺丝
      category: 水产
      months: [3, 4, 5]
      best: 清明前后
      storage: 清水养2天
      notes: 不适合2岁宝宝（太小难以取出）
    - name: 河虾
      category: 水产
      months: [3, 4, 5, 6]
      best: 4-5月
      storage: 冰鲜当天
      notes: 优质蛋白，适合辅食
    - name: 香椿
      category: 蔬菜
      months: [3, 4]
      best: 3月底-4月中
      storage: 冷藏2天
      notes: 气味重，部分宝宝可能不接受

summer:
  months: [6, 7, 8]
  local_produce:
    - name: 杨梅
      category: 水果
      months: [6, 7]
      best: 6月中-7月初
      storage: 不耐储，当天吃完
      notes: 仙居杨梅最知名，注意过敏风险
    - name: 西瓜
      category: 水果
      months: [6, 7, 8]
      best: 7-8月
      storage: 常温
      notes: 2岁可少量，糖分高
    - name: 丝瓜
      category: 蔬菜
      months: [6, 7, 8]
      best: 7-8月
      storage: 冷藏3天
      notes: 清热，适合夏季辅食
    - name: 冬瓜
      category: 蔬菜
      months: [6, 7, 8]
      best: 7月
      storage: 常温1周
      notes: 低敏，适合宝宝
    - name: 莲子
      category: 杂粮
      months: [7, 8]
      best: 7-8月
      storage: 干品常年
      notes: 新鲜莲子需去芯，2岁+可尝试

autumn:
  months: [9, 10, 11]
  local_produce:
    - name: 螃蟹
      category: 水产
      months: [9, 10, 11]
      best: 10月（阳澄湖）
      storage: 活鲜当天
      notes: 2岁内不推荐（壳硬、致敏）
    - name: 柿子
      category: 水果
      months: [9, 10, 11]
      best: 10月
      storage: 催熟后冷藏2天
      notes: 太岁/涩柿不适合宝宝，甜脆脆柿可少量
    - name: 栗子
      category: 杂粮
      months: [9, 10, 11]
      best: 10月
      storage: 冷藏1个月
      notes: 2岁可尝试，需切碎
    - name: 桂花
      category: 调料/饮品
      months: [9, 10]
      best: 9月
      storage: 干品
      notes: 桂花糖/桂花糕可少量
    - name: 萝卜
      category: 蔬菜
      months: [9, 10, 11]
      best: 10-11月
      storage: 冷藏2周
      notes: 杭州本地萝卜脆甜，适合辅食

winter:
  months: [12, 1, 2]
  local_produce:
    - name: 冬笋
      category: 蔬菜
      months: [12, 1, 2]
      best: 1月
      storage: 冷藏1周
      notes: 冬季稀缺，价高
    - name: 腌菜/雪菜
      category: 腌制
      months: [12, 1, 2]
      best: 冬季
      storage: 冷藏2周
      notes: 亚硝酸盐风险，2岁内不推荐
    - name: 酱鸭
      category: 肉类
      months: [12, 1, 2]
      best: 冬至后
      storage: 冷藏1周
      notes: 高盐，2岁内不推荐
    - name: 年糕
      category: 主食
      months: [12, 1, 2]
      best: 全季
      storage: 常温1个月
      notes: 宁波/绍兴年糕，2岁可尝试，需切小块
    - name: 火锅
      category: 餐饮形式
      months: [11, 12, 1, 2]
      best: 冬季
      storage: NA
      notes: 适合家庭聚餐，注意清汤锅底，2岁食材煮软

# 全年可用（温室/外地输入）
year_round:
  vegetables:
    - 小白菜/青菜（全年）
    - 胡萝卜（全年）
    - 西兰花（全年）
    - 南瓜（全年）
    - 红薯（10月-次年3月）
  fruits:
    - 苹果（全年）
    - 香蕉（全年）
    - 梨（9月-次年4月）
  proteins:
    - 三文鱼（进口，全年）
    - 鸡蛋（全年）
    - 豆腐（全年）
    - 鸡胸肉（全年）