# 滨江区亲子资源 v1.0
# 特点：互联网从业者聚集，年轻人家庭多，商业配套完善

district: 滨江区
characteristics: |
  滨江区是杭州高新区，聚集了大量互联网公司（阿里、网易、华为杭州等）。
  年轻家庭多，亲子需求旺盛。商业配套完善，龙湖天街、星耀城等商业体密集。
  靠近钱塘江，有江边户外资源。

major_commercial_centers:
  - name: 滨江龙湖天街
    address: 滨江区江汉路1515号
    lat_lng: [120.2118, 30.2089]
    indoor_playground: true
    kids_brands: ["孩子王", "乐高", "玩具反斗城"]
    grocery_nearby: 盒马鲜生（天街B1层）/ 永辉超市
    parent_facilities: 母婴室（A/B层各1个）
    subway_nearby: "1号线 滨和路站（步行3分钟）"
    notes: 周末人多，上午10点前到达停车位充足
    
  - name: 滨江星光大道
    address: 滨江区江南大道228号
    lat_lng: [120.2128, 30.2078]
    indoor_playground: false
    kids_brands: []
    grocery_nearby: 世纪联华
    parent_facilities: 1个母婴室（3楼）
    subway_nearby: "1号线 滨和路站（步行8分钟）"
    notes: 餐饮为主，儿童设施较少
    
  - name: 宝龙城
    address: 滨江区江南大道1090号
    lat_lng: [120.2068, 30.2058]
    indoor_playground: true
    kids_brands: ["，孩子王"]
    grocery_nearby: 永辉超市
    parent_facilities: 母婴室（2楼）
    subway_nearby: "6号线 诚业路站（步行5分钟）"
    notes: 对面是浙江大学附属儿童医院（滨江院区）

hospitals:
  - name: 浙江大学附属儿童医院（滨江院区）
    address: 滨江区滨盛路3333号
    lat_lng: [120.2056, 30.2100]
    pediatric_excellence: [新生儿科, 小儿内科, 小儿外科, 小儿骨科]
    emergency_24h: true
    pediatric_dental: true
    subway_nearby: "6号线 建业路站（步行10分钟）"
    parking: 地上地下停车场（5元/小时）
    notes: 杭州最权威的儿童医院，人流量大，建议预约
    appointment_tips: "提前7天放号，儿保科建议提前1个月预约"
    
  - name: 杭州师范大学附属医院
    address: 拱墅区温州路126号
    lat_lng: [120.1567, 30.3195]
    pediatric_excellence: [儿科]
    emergency_24h: true
    subway_nearby: "5号线 大运河站（步行5分钟）"
    notes: 综合医院，儿科实力较强，适合非紧急情况

outdoor_parks:
  - name: 钱塘江南岸（樱花跑道）
    address: 滨江区闻涛路
    lat_lng: [120.2098, 30.2050]
    type: 江边绿地
    suitable_age: [6m+, 全年龄]
    facilities: [跑道, 草坪, 儿童滑梯, 洗手池]
    shadeless: false  # 部分有树荫
    parking: 闻涛路路边停车
    subway_access: "1号线 滨和路站（步行10分钟）"
    best_time: "春秋季 9:00-11:00（上午人少）"
    notes: |
      沿江樱花跑道，全长约10公里。
      推荐从闻涛路最美跑道段进入，有儿童游乐区。
      春季樱花盛开时人极多，建议工作日上午去。
    hazards: 江边需注意安全，2岁以下需全程牵手
    
  - name: 滨江公园（钱塘江南岸）
    address: 滨江区江南大道至滨盛路
    lat_lng: [120.2080, 30.2070]
    type: 城市公园
    suitable_age: [1y+, 全年龄]
    facilities: [草坪, 沙坑, 滑梯, 秋千]
    shadeless: false
    parking: 附近停车场
    subway_access: "1号线 滨和路站"
    best_time: "9:00-11:00 或 15:00-17:00"
    notes: 免费，设施维护一般，周末人多
    
  - name: 闻涛路最美跑道
    address: 滨江区闻涛路
    type: 江堤+跑道
    suitable_age: [2y+（会走）]
    facilities: [跑步道, 骑行道, 座椅]
    best_time: "傍晚看夕阳极美（17:00-18:30）"
    notes: 傍晚人多，建议15:00-16:30去
    
  - name: 白马湖公园
    address: 滨江区长江路158号
    lat_lng: [120.2245, 30.1923]
    type: 大型公园+创意园区
    suitable_age: [全年龄]
    facilities: [草坪, 湖泊, 儿童乐园, 停车场]
    shadeless: true
    parking: 地面停车（免费）
    notes: 面积大，人少，可以野餐。距市中心较远。
    hazards: 夏季无遮挡，需防晒

  - name: 冠山公园
    address: 滨江区南环路
    lat_lng: [120.1980, 30.1990]
    type: 山体公园
    suitable_age: [3y+（会走山路）]
    facilities: [登山道, 亭子]
    notes: 小山，适合喜欢登山的宝宝，2岁内需要背带

