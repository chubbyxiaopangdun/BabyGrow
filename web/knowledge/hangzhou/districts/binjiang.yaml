key_activities_by_age:
  6m_12m:
    - 名称: 婴儿爬行探索
      地点: 家中游戏垫
      时长: 20分钟
      准备: 软垫、玩具
    - 名称: 户外晒太阳
      地点: 钱塘江南岸
      时长: 30分钟
      准备: 婴儿车、防晒帽
    - 名称: 室内游乐场
      地点: 滨江龙湖天街
      时长: 1-2小时
      准备: 隔汗巾、备用衣服

  12m_24m:
    - 名称: 江边沙子+看轮船
      地点: 闻涛路樱花跑道
      时长: 1.5小时
      准备: 挖沙工具、备用衣服
    - 名称: 室内游乐场放电
      地点: 宝龙城/龙湖天街
      时长: 2-3小时
      准备: 零食、水杯
    - 名称: 逛超市认知
      地点: 盒马/永辉
      时长: 40分钟
      准备: 无

  24m_36m:
    - 名称: 户外奔跑+骑车
      地点: 钱塘江南岸/白马湖公园
      时长: 2-3小时
      准备: 平衡车/滑板车、零食、水
    - 名称: 图书馆绘本时间
      地点: 滨江区图书馆
      时长: 1小时
      准备: 无
    - 名称: 儿童职业体验
      地点: 嘟嘟城
      时长: 3-4小时
      准备: 水、零食
    - 名称: 游泳戏水
      地点: 水裹·汤泉
      时长: 2小时
      准备: 泳裤、防水纸尿裤（如需要）