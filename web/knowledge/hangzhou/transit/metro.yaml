# 杭州地铁亲子出行指南 v1.0
version: 1.0

overview: |
  杭州地铁已开通12条线路，主城区覆盖率较高。
  带娃出行推荐地铁，避免拥堵和停车难。
  重点标注儿童相关目的地的换乘方案。

key_lines_for_family:
  - line: 1号线
    color: 红色
    stations:
      - name: 湘湖站
        nearby: "杭州乐园·嘟嘟城"
        tips: "1号线终点站，人少，上车有座位概率高"
      - name: 滨和路站
        nearby: "滨江龙湖天街、星光大道"
        tips: "滨江核心商圈，母婴设施较好"
      - name: 龙翔桥站
        nearby: "湖滨商圈、西湖"
        tips: "西湖边最近地铁站，极度拥挤，避峰出行"
      - name: 凤起路站
        nearby: "少年宫、浙江大学附属儿童医院湖滨"
        tips: "儿童医院最近站，提前7天挂号"
      - name: 城站
        nearby: "杭州站火车站"
        tips: "老城站，地铁+火车换乘"

  - line: 2号线
    color: 橙色
    stations:
      - name: 沈塘桥站
        nearby: "浙江科技馆、自然博物馆"
        tips: "科技馆/博物馆最近站，需预约"
      - name: 良渚站
        nearby: "良渚文化村、良渚博物院"
        tips: 适合大宝宝，户外+文化组合

  - line: 4号线
    color: 紫色
    stations:
      - name: 水澄桥站
        nearby: "白塔公园"
        tips: "白塔公园有绿皮火车展示，适合2y+"

  - line: 5号线
    color: 青绿色
    stations:
      - name: 大运河站
        nearby: "小河公园、运河广场、拱宸桥、杭州第二人民医院"
        tips: "运河文化带核心站，适合亲子文化游"
      - name: 杭氧站
        nearby: "武林广场、杭州大厦"
        tips: 老城区商圈

  - line: 6号线
    color: 粉蓝色
    stations:
      - name: 建业路站
        nearby: "浙江大学附属儿童医院（滨江院区）"
        tips: "儿保最近站，6号线直达滨江院区"
      - name: 之浦路站
        nearby: "之江绿道、之江大桥"
        tips: 靠近钱塘江，适合户外

  - line: 7号线
    color: 青色
    stations:
      - name: 吴山广场站
        nearby: "河坊街、清河坊、南宋御街"
        tips: "老杭州文化街，工作日下午去人少"

  - line: 19号线
    color: 青色
    stations:
      name: 御道站
      nearby: "钱江新城、城市阳台"
      tips: 适合看灯光秀（周二/周五/周六晚）

family_tips:
  - 优先选择首末班车时段，车厢空旷有座位
  - 婴儿车推荐使用折叠式，地铁高峰时段避免出行
  - 带2岁以下宝宝建议带背带，比推车更方便
  - 换乘时注意有无垂直电梯（无障碍电梯）
  - 1号线/2号线部分老站没有扶梯，带娃推车建议提前查询

accessibility:
  family_friendly_stations:
    - 滨和路站（1号线）：B口有电梯，直达龙湖天街
    - 大运河站（5号线）：全站电梯覆盖，连接运河文化带
    - 建业路站（6号线）：B口直达儿保方向
  non_accessible_notes: |
    部分老线路（1号线部分站）只有楼梯，换乘需注意。
    推车出行前建议用"杭州地铁"APP查询车站设施。