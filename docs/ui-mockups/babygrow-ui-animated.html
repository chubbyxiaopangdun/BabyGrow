<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabyGrow - 动效原型</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#FF9B5E;--pL:#FFC9A0;--pD:#E87840;--pG:#FFF1E8;
  --s:#7ECFB3;--sL:#A8E6CF;--sD:#5BB896;--sG:#EEF9F4;
  --bg:#FFFCF8;--bgC:#FFFFFF;--bgS:#FBF7F2;--bgH:#F5EDE4;
  --t:#1C1411;--t2:#6B5A4E;--t3:#A8998E;
  --ok:#5BB896;--warn:#F5A623;--err:#E85C5C;--info:#4A9EF5;
  --sh-sm:0 1px 4px rgba(44,20,17,.06);
  --sh-md:0 4px 16px rgba(44,20,17,.08);
  --sh-lg:0 8px 32px rgba(44,20,17,.12);
  --sh-glow:0 4px 20px rgba(255,155,94,.30);
}
body{
  background:linear-gradient(135deg,#0a0a1a 0%,#1a1030 50%,#0f1520 100%);
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;overflow-x:hidden;
}

/* ═══════════════ FLOATING PARTICLES ═══════════════ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;opacity:.15;
  animation:floatParticle linear infinite;
}
@keyframes floatParticle{
  0%{transform:translateY(100vh) rotate(0deg)}
  100%{transform:translateY(-100px) rotate(360deg)}
}

/* ═══════════════ PAGE TITLE ═══════════════ */
.proto-title{
  text-align:center;color:#fff;margin-bottom:6px;
  font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;
  letter-spacing:.02em;position:relative;z-index:1;
  text-shadow:0 2px 20px rgba(255,155,94,.3);
}
.proto-sub{
  text-align:center;color:rgba(255,255,255,.4);margin-bottom:32px;
  font-size:13px;position:relative;z-index:1;letter-spacing:.1em;
}

/* ═══════════════ iPHONE FRAME ═══════════════ */
.phone-wrap{position:relative;z-index:1;perspective:1200px}
.phone{
  width:340px;height:700px;background:#000;border-radius:52px;
  padding:10px 8px;position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08),
    inset 0 0 0 1px rgba(255,255,255,.05);
  transition:transform .6s cubic-bezier(.34,1.56,.64,1);
}
.phone:hover{transform:rotateY(-2deg) rotateX(1deg)}
.island{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:110px;height:30px;background:#000;border-radius:16px;z-index:30;
}
.screen{
  width:320px;height:676px;background:var(--bg);border-radius:44px;
  overflow:hidden;position:relative;
}
.status-bar{
  position:absolute;top:0;left:0;right:0;height:50px;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:0 24px 4px;pointer-events:none;
}
.sb-time{font-size:13px;font-weight:600;color:var(--t)}
.sb-icons{display:flex;gap:5px;align-items:center}
.sb-icons svg{display:block}
.home-ind{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:110px;height:5px;background:rgba(0,0,0,.2);border-radius:3px;z-index:30;
}

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,155,94,.2)}50%{box-shadow:0 0 24px rgba(255,155,94,.5)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes breathe{0%,100%{box-shadow:0 2px 8px rgba(44,20,17,.06)}50%{box-shadow:0 4px 20px rgba(255,155,94,.2)}}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(200px) rotate(720deg) scale(0);opacity:0}}
@keyframes ringDraw{from{stroke-dashoffset:157}to{stroke-dashoffset:23.5}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dotPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,155,94,.4)}50%{transform:scale(1.1);box-shadow:0 0 0 8px rgba(255,155,94,0)}}
@keyframes tiltCard{0%{transform:perspective(600px) rotateY(0) scale(1)}50%{transform:perspective(600px) rotateY(3deg) scale(1.02)}100%{transform:perspective(600px) rotateY(0) scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes tabBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes sweep{0%{left:-100%}100%{left:200%}}
@keyframes avatarRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0) rotate(-10deg)}60%{transform:scale(1.1) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

.anim-slide-up{animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both}
.anim-fade{animation:fadeIn .4s ease both}
.anim-scale{animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) both}
.anim-bounce{animation:bounceIn .6s ease both}

/* Stagger delays */
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
.d7{animation-delay:.35s}.d8{animation-delay:.4s}.d9{animation-delay:.45s}
.d10{animation-delay:.5s}.d11{animation-delay:.55s}.d12{animation-delay:.6s}

/* ═══════════════ BOTTOM TAB BAR ═══════════════ */
.tab-bar{
  position:absolute;bottom:0;left:0;right:0;height:64px;
  background:var(--bgC);border-top:1px solid var(--bgH);
  display:flex;align-items:center;justify-content:space-around;
  z-index:10;padding-bottom:8px;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;transition:all .3s;position:relative;padding:4px 12px;
  -webkit-tap-highlight-color:transparent;
}
.tab-icon{font-size:20px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);position:relative}
.tab-label{font-size:9px;color:var(--t3);transition:color .3s;font-weight:500}
.tab-item.active .tab-label{color:var(--p);font-weight:600}
.tab-item.active .tab-icon{animation:tabBounce .4s ease}
.tab-dot{
  position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--p);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.tab-item.ai-tab .tab-icon{
  background:linear-gradient(135deg,var(--s),var(--sL));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:pulse 2s ease-in-out infinite;
}
.tab-item.ai-tab.active .tab-icon{
  -webkit-text-fill-color:initial;
  filter:drop-shadow(0 0 8px rgba(126,207,179,.4));
}

/* ═══════════════ SCREEN CONTAINER ═══════════════ */
.screen-content{
  position:absolute;top:50px;left:0;right:0;bottom:64px;
  overflow-y:auto;overflow-x:hidden;padding:0 16px 16px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.screen-content::-webkit-scrollbar{display:none}
.screen-content.no-tab{bottom:0}

/* ═══════════════ WELCOME SCREEN ═══════════════ */
.welcome-header{
  background:linear-gradient(135deg,#FF9B5E 0%,#FFB88C 40%,#FFC9A0 70%,#FFD4B5 100%);
  background-size:200% 200%;animation:gradientShift 6s ease infinite;
  padding:56px 24px 36px;text-align:center;
  border-radius:0 0 28px 28px;margin:-50px -16px 0;
  position:relative;
}
.welcome-logo{font-size:52px;animation:float 3s ease-in-out infinite;display:inline-block}
.welcome-title{
  font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;
  color:#fff;margin-top:8px;text-shadow:0 2px 12px rgba(0,0,0,.1);
}
.welcome-sub{font-size:13px;color:rgba(255,255,255,.85);margin-top:4px}
.welcome-card{
  background:var(--bgC);margin:-20px 12px 16px;border-radius:18px;
  padding:22px 18px;box-shadow:var(--sh-lg);position:relative;z-index:2;
}
.welcome-card h3{
  font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;
  color:var(--t);margin-bottom:16px;
}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:500}
.form-input{
  background:var(--bgS);border-radius:10px;padding:11px 13px;font-size:14px;
  color:var(--t);border:1.5px solid transparent;transition:all .3s;
  width:100%;
}
.form-input:focus{border-color:var(--p);background:var(--pG);outline:none}
.gender-row{display:flex;gap:10px}
.gender-btn{
  flex:1;border-radius:10px;padding:9px;text-align:center;font-size:13px;
  cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  border:1.5px solid transparent;
}
.gender-btn.sel{background:var(--pG);border-color:var(--p);color:var(--p);font-weight:600}
.gender-btn:not(.sel){background:var(--bgS);color:var(--t3)}
.gender-btn:hover{transform:scale(1.02)}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  border:1px solid transparent;
}
.tag.on{background:var(--pG);color:var(--p);border-color:var(--p);transform:scale(1)}
.tag:not(.on){background:var(--bgS);color:var(--t3)}
.tag:hover{transform:scale(1.05)}
.cta-btn{
  background:linear-gradient(135deg,var(--p),var(--pD));color:#fff;
  border-radius:16px;padding:15px;text-align:center;font-size:16px;
  font-weight:700;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:var(--sh-glow);transition:all .3s;
}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(255,155,94,.4)}
.cta-btn:active{transform:scale(.98)}
.cta-sweep{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:sweep 2.5s ease-in-out infinite;
}

/* ═══════════════ HOME SCREEN ═══════════════ */
.home-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0 12px;
}
.child-pill{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:4px 10px 4px 4px;border-radius:20px;transition:all .3s;
}
.child-pill:hover{background:var(--bgS)}
.child-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--p);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  animation:breathe 3s ease-in-out infinite;
}
.child-name{font-size:14px;font-weight:700;color:var(--t)}
.child-age{font-size:11px;color:var(--t3)}
.header-icon{font-size:18px;cursor:pointer;transition:transform .3s}
.header-icon:hover{transform:rotate(90deg)}

.child-card{
  background:var(--bgC);border-radius:18px;padding:16px;margin-bottom:12px;
  box-shadow:var(--sh-md);transition:all .3s;cursor:pointer;
}
.child-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cc-avatar{
  width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pL),var(--p));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 4px 12px rgba(255,155,94,.3);animation:float 4s ease-in-out infinite;
}
.cc-info h3{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--t)}
.cc-info span{font-size:11px;color:var(--t3)}
.ai-tip{
  background:var(--pG);border-radius:12px;padding:12px 14px;
  animation:breathe 4s ease-in-out infinite;border:1px solid rgba(255,155,94,.15);
}
.ai-tip-label{font-size:12px;font-weight:600;color:var(--p);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ai-tip-text{font-size:12px;color:var(--t2);line-height:1.6}

.advisors{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.advisor-card{
  background:var(--bgC);border-radius:14px;padding:16px 14px;
  box-shadow:var(--sh-sm);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.advisor-card:hover{
  transform:perspective(600px) rotateY(3deg) translateY(-3px);
  box-shadow:var(--sh-md);
}
.advisor-card:active{transform:scale(.97)}
.advisor-icon{font-size:28px;margin-bottom:8px;display:block}
.advisor-title{font-size:13px;font-weight:600;color:var(--t)}
.advisor-desc{font-size:11px;color:var(--t3);margin-top:2px}
.advisor-arrow{color:var(--p);font-size:12px;margin-top:8px;font-weight:600}

.section-label{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:8px;padding-left:4px}
.record-list{background:var(--bgC);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:var(--sh-sm)}
.record-item{
  display:flex;align-items:center;padding:13px 14px;gap:10px;
  cursor:pointer;transition:all .2s;
}
.record-item:hover{background:var(--bgS)}
.record-item:active{background:var(--bgH)}
.record-item+.record-item{border-top:1px solid var(--bgH)}
.record-icon{font-size:18px;width:24px;text-align:center}
.record-text{flex:1;font-size:13px;color:var(--t)}
.record-arrow{color:var(--t3);font-size:12px;transition:transform .2s}
.record-item:hover .record-arrow{transform:translateX(3px)}

.ai-float{
  background:var(--bgC);border-radius:14px;padding:12px 16px;margin-bottom:12px;
  border:1.5px solid var(--sL);cursor:pointer;transition:all .3s;
  animation:float 5s ease-in-out infinite;box-shadow:var(--sh-sm);
}
.ai-float:hover{border-color:var(--s);box-shadow:0 4px 16px rgba(126,207,179,.2)}
.ai-float-title{font-size:12px;color:var(--s);font-weight:600;display:flex;align-items:center;gap:4px}
.ai-float-text{font-size:11px;color:var(--t3);margin-top:2px;font-style:italic}

/* ═══════════════ SCHEDULE ═══════════════ */
.sched-header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px}
.sched-back{font-size:14px;color:var(--t);font-weight:600;cursor:pointer}
.sched-date{font-size:12px;color:var(--t2);padding:0 0 14px}
.timeline{position:relative;padding-left:56px}
.timeline::before{
  content:'';position:absolute;left:68px;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom,var(--pL),var(--bgH));
}
.tl-item{position:relative;margin-bottom:12px}
.tl-time{
  position:absolute;left:-56px;top:12px;width:48px;text-align:right;
  font-size:12px;font-weight:600;color:var(--t2);
}
.tl-dot{
  position:absolute;left:-12px;top:14px;width:12px;height:12px;
  border-radius:50%;z-index:2;transition:all .3s;
}
.tl-dot.current{animation:dotPulse 2s ease-in-out infinite}
.tl-card{
  border-radius:12px;padding:12px 14px;transition:all .3s;cursor:pointer;
}
.tl-card:hover{transform:translateX(4px)}
.tl-card-title{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tl-card-title span{font-size:14px}
.tl-card-title strong{font-size:13px;color:var(--t)}
.tl-card-desc{font-size:11px;color:var(--t2);line-height:1.5}
.tl-card-tip{font-size:10px;color:var(--sD);margin-top:4px}

.sched-tips{
  background:var(--bgC);border-radius:12px;padding:14px;margin-top:8px;
  box-shadow:var(--sh-sm);
}
.sched-tips h4{font-size:12px;font-weight:600;color:var(--t);margin-bottom:6px}
.sched-tips p{font-size:11px;color:var(--t2);line-height:1.7}

/* ═══════════════ SLEEP ═══════════════ */
.sleep-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{
  background:var(--bgC);border-radius:12px;padding:14px 8px;text-align:center;
  box-shadow:var(--sh-sm);transition:all .3s;cursor:default;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.stat-val{
  font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--p);
  transition:all .6s cubic-bezier(.34,1.56,.64,1);
}
.stat-label{font-size:10px;color:var(--t3);margin-top:3px}

.ai-report{
  background:var(--sG);border-radius:14px;padding:14px;margin-bottom:14px;
  border:1px solid var(--sL);position:relative;overflow:hidden;
}
.ai-report::before{
  content:'';position:absolute;top:-50%;right:-20%;width:100px;height:100px;
  background:radial-gradient(circle,rgba(126,207,179,.15),transparent);border-radius:50%;
}
.ai-report h4{font-size:12px;font-weight:600;color:var(--sD);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ai-report-score{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.score-ring{width:40px;height:40px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:4;stroke-linecap:round}
.score-ring .bg{stroke:var(--sL)}
.score-ring .fg{stroke:var(--sD);stroke-dasharray:157;animation:ringDraw 1.5s ease forwards}
.score-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif SC',serif;font-size:14px;font-weight:700;color:var(--sD);
}
.ai-report p{font-size:11px;color:var(--t2);line-height:1.5}

.sleep-record{
  background:var(--bgC);border-radius:12px;overflow:hidden;margin-bottom:10px;
  box-shadow:var(--sh-sm);
}
.sr-date{padding:5px 14px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--bgH)}
.sr-content{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.sr-info{font-size:13px;font-weight:600;color:var(--t)}
.sr-status{font-size:11px;margin-top:2px}
.sr-status.good{color:var(--ok)}
.sr-status.warn{color:var(--warn)}
.sr-del{font-size:14px;cursor:pointer;transition:transform .2s}
.sr-del:hover{transform:scale(1.2)}

/* ═══════════════ RECORDS ═══════════════ */
.date-switch{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 0 14px}
.date-arrow{
  font-size:14px;color:var(--t3);cursor:pointer;transition:all .3s;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;
}
.date-arrow:hover{background:var(--bgS);color:var(--t);transform:scale(1.1)}
.date-text{font-size:13px;font-weight:600;color:var(--t)}

.record-section{
  background:var(--bgC);border-radius:14px;margin-bottom:12px;
  box-shadow:var(--sh-sm);overflow:hidden;
}
.rs-header{
  padding:11px 14px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bgH);
}
.rs-header h4{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:6px}
.rs-add{font-size:11px;color:var(--p);cursor:pointer;font-weight:600;transition:transform .2s}
.rs-add:hover{transform:scale(1.05)}
.rs-item{
  padding:9px 14px;font-size:12px;color:var(--t);display:flex;gap:8px;
  transition:background .2s;cursor:default;
}
.rs-item:hover{background:var(--bgS)}
.rs-item+.rs-item{border-top:1px solid var(--bgH)}

const {useState,useEffect,useRef,useCallback}=React;

/* ═══════════════ HELPERS ═══════════════ */
function AnimateCount({target,suffix='',duration=1200}){
  const [val,setVal]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    let start=null;
    const step=ts=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/duration,1);
      setVal(Math.round(p*target));
      if(p<1)ref.current=requestAnimationFrame(step);
    };
    ref.current=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(ref.current);
  },[target,duration]);
  return <span>{val}{suffix}</span>;
}

/* ═══════════════ AI CHAT ═══════════════ */
function Chat({onBack}){
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);

  const aiReply=(text)=>{
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(p=>[...p,{role:'ai',text}]);
    },1500);
  };

  const send=(text)=>{
    if(!text)return;
    setMsgs(p=>[...p,{role:'user',text}]);
    setInput('');
    setTimeout(()=>{
      aiReply('这是个很好的问题！豆豆10个月大，正处于对食物探索的阶段。建议：\n\n1. 变换食物造型和颜色\n2. 让宝宝自己抓着吃\n3. 固定就餐时间\n4. 准备防摔餐碗\n\n每个宝宝都有自己的节奏，耐心引导就好 💛');
    },500);
  };

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,typing]);

  return(
    <div className="chat-wrap">
      <div className="chat-header anim-fade">
        <h3>🤖 育儿助手</h3>
        <div className="chat-close" onClick={onBack}>✕</div>
      </div>
      <div className="chat-messages">
        <div className="msg ai anim-slide-left d1">
          <div className="msg-av ai">🤖</div>
          <div className="msg-bubble">你好！我是豆豆的专属育儿顾问。有什么我能帮到你的吗？</div>
        </div>
        {msgs.length===0&&(
          <div className="quick-questions anim-slide-up d2">
            <div className="qq-label">快速提问：</div>
            <div className="qq-tags">
              {['宝宝不爱吃饭','什么时候加辅食','夜醒频繁','出牙期注意事项'].map(q=>(
                <div key={q} className="qq-tag" onClick={()=>send(q)}>{q}</div>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div key={i} className={`msg ${m.role} anim-slide-${m.role==='user'?'right':'left'}`}>
            {m.role==='ai'&&<div className="msg-av ai">🤖</div>}
            <div className="msg-bubble" style={{whiteSpace:'pre-line'}}>{m.text}</div>
          </div>
        ))}
        {typing&&(
          <div className="msg ai anim-fade">
            <div className="msg-av ai">🤖</div>
            <div className="msg-bubble">
              <div className="typing-indicator">
                <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input anim-slide-up">
        <div className="chat-attach">📎</div>
        <input className="chat-text" placeholder="输入你的问题..." value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&send(input)}/>
        <div className="chat-voice">🎤</div>
        <button className="chat-send" onClick={()=>send(input)}>›</button>
      </div>
    </div>
  );
}

/* ═══════════════ MILESTONES ═══════════════ */
function Milestones(){
  const [milestones,setMilestones]=useState([
    {cat:'大运动',items:[
      {text:'扶站',done:true},{text:'独坐稳定',done:true},
      {text:'独站片刻',done:false},{text:'扶走',done:false},
    ]},
    {cat:'语言',items:[
      {text:'叫"爸爸""妈妈"有指向',done:true},
      {text:'有意识说3个以上词汇',done:false},
    ]},
  ]);
  const [confetti,setConfetti]=useState([]);

  const toggle=(ci,ii)=>{
    setMilestones(p=>{
      const n=[...p];n[ci]={...n[ci],items:[...n[ci].items]};
      n[ci].items[ii]={...n[ci].items[ii],done:!n[ci].items[ii].done};
      return n;
    });
    // confetti burst
    const colors=['#FF9B5E','#7ECFB3','#FFC9A0','#A8E6CF','#E85C5C','#4A9EF5','#F5A623'];
    const pieces=Array.from({length:25},(_,i)=>({
      id:Date.now()+i,
      x:160,y:200,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,
      tx:(Math.random()-0.5)*200,
      delay:Math.random()*0.3,
    }));
    setConfetti(pieces);
    setTimeout(()=>setConfetti([]),2000);
  };

  const cats=[
    {icon:'🏃',name:'大运动',done:5,total:8,bg:'var(--pG)'},
    {icon:'🗣️',name:'语言',done:3,total:6,bg:'var(--sG)'},
    {icon:'🧠',name:'认知',done:4,total:7,bg:'#F0E6FF'},
    {icon:'🤝',name:'社交',done:2,total:5,bg:'#E6F0FF'},
  ];

  return(
    <>
      <div className="anim-fade" style={{padding:'4px 0'}}><div style={{fontSize:14,fontWeight:600,color:'var(--t)'}}>‹ 发育里程碑</div></div>
      <div className="milestone-age anim-scale d1">
        <div className="age-badge">
          <div className="age-num">10</div>
          <div className="age-unit">个月</div>
        </div>
      </div>
      <div className="ms-filters anim-slide-up d2">
        {['全部','大运动','语言','认知','社交'].map((t,i)=>(
          <div key={t} className={`ms-filter ${i===0?'active':''}`}>{t}</div>
        ))}
      </div>
      <div className="ms-categories">
        {cats.map((c,i)=>(
          <div key={i} className={`ms-cat anim-scale d${i+3}`} style={{background:c.bg}}>
            <div className="ms-cat-icon">{c.icon}</div>
            <div className="ms-cat-name">{c.name}</div>
            <div className="ms-cat-count">{c.done}/{c.total}</div>
          </div>
        ))}
      </div>
      {milestones.map((g,gi)=>(
        <div key={gi} className="ms-group anim-slide-up d${gi+6}">
          <div className="ms-group-title">{g.cat} · 10个月</div>
          <div className="ms-list">
            {g.items.map((it,ii)=>(
              <div key={ii} className={`ms-item ${it.done?'done':''}`} onClick={()=>toggle(gi,ii)}>
                <div className="ms-check">{it.done?'✅':'⬜'}</div>
                <div className="ms-text">{it.text}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      {/* Confetti */}
      {confetti.length>0&&(
        <div className="confetti-container">
          {confetti.map(c=>(
            <div key={c.id} className="confetti" style={{
              left:c.x,top:c.y,background:c.color,
              transform:`rotate(${c.rot}deg)`,
              animationDelay:`${c.delay}s`,
              '--tx':`${c.tx}px`,
            }}/>
          ))}
        </div>
      )}
    </>
  );
}

/* ═══════════════ APP ═══════════════ */
function App(){
  const [screen,setScreen]=useState('welcome');
  const [prevScreen,setPrevScreen]=useState(null);
  const [animKey,setAnimKey]=useState(0);

  const navigate=(s)=>{
    if(s===screen)return;
    setPrevScreen(screen);
    setScreen(s);
    setAnimKey(k=>k+1);
  };

  const tabs=[
    {id:'home',icon:'🏠',label:'首页'},
    {id:'records',icon:'📋',label:'记录'},
    {id:'chat',icon:'🤖',label:'AI助手',ai:true},
    {id:'milestones',icon:'⭐',label:'里程碑'},
    {id:'profile',icon:'👤',label:'我的'},
  ];

  const isModal=screen==='welcome'||screen==='schedule'||screen==='sleep'||screen==='chat';
  const renderScreen=()=>{
    switch(screen){
      case 'welcome':return <Welcome onDone={()=>navigate('home')}/>;
      case 'home':return <Home onNavigate={navigate}/>;
      case 'schedule':return <Schedule onBack={()=>navigate('home')}/>;
      case 'sleep':return <Sleep onBack={()=>navigate('home')}/>;
      case 'records':return <Records/>;
      case 'chat':return <Chat onBack={()=>navigate('home')}/>;
      case 'milestones':return <Milestones/>;
      case 'profile':return <Profile/>;
      default:return <Home onNavigate={navigate}/>;
    }
  };

  const tabItems=[
    {id:'home',icon:'🏠',label:'首页'},
    {id:'records',icon:'📋',label:'记录'},
    {id:'chat',icon:'🤖',label:'AI助手',ai:true},
    {id:'milestones',icon:'⭐',label:'里程碑'},
    {id:'profile',icon:'👤',label:'我的'},
  ];

  return(
    <>
      <div style={{position:'absolute',top:50,left:0,right:0,bottom:isModal?0:64,overflow:'hidden'}}>
        <div key={animKey} style={{height:'100%'}}>
          {renderScreen()}
        </div>
      </div>
      {!isModal&&(
        <div className="tab-bar">
          {tabItems.map(t=>(
            <div key={t.id} className={`tab-item ${screen===t.id?'active':''} ${t.ai?'ai-tab':''}`}
              onClick={()=>navigate(t.id)}>
              <div className="tab-icon">{t.icon}</div>
              <div className="tab-label">{t.label}</div>
              {screen===t.id&&<div className="tab-dot"/>}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('react-root')).render(<App/>);
