<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BabyGrow · Final</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#7EC8B8;--mint-l:#D4EDE5;--mint-xl:#EDF7F3;
  --peach:#E8A87C;--peach-l:#F5DCC8;--peach-xl:#FDF0E6;
  --sky:#8BB8D6;--sky-l:#CEE0F0;--sky-xl:#EAF3FA;
  --lav:#B5A3CC;--lav-l:#DDD4EB;--lav-xl:#F0EBF6;
  --rose:#D4A0A0;--rose-l:#F0D4D4;--rose-xl:#FAEAEA;
  --cream:#FDF9F3;--cream2:#F5EFE6;--cream3:#EDE6DA;
  --card:#FFFFFF;--ink:#3C3C3C;--ink2:#6E6E73;--ink3:#A0A0A5;--ink4:#C7C7CC;
  --sep:rgba(0,0,0,.06);--ok:#8CC5A0;--warn:#E8C76A;--err:#D48A8A;
  --font:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{background:var(--cream2);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}

/* ═══ DEVICE — iPhone 15 Pro ═══ */
.device{position:relative;width:393px;height:852px;background:#1a1a1a;border-radius:55px;padding:11px 10px;
  box-shadow:0 40px 100px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.06)}
.scr{width:373px;height:830px;background:var(--cream);border-radius:45px;overflow:hidden;position:relative}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#1a1a1a;border-radius:20px;z-index:200}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:190;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 6px;pointer-events:none}
.sbar-t{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:.01em}
.sbar-i{display:flex;gap:5px;align-items:center}
.home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--ink);border-radius:3px;opacity:.12;z-index:200}

/* ═══ SCREEN SYSTEM ═══ */
.screen{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.scroll.has-tab{padding-bottom:90px}

/* ═══ NAV — Large Title ═══ */
.nav-lg{padding:54px 20px 10px;background:var(--cream);position:sticky;top:0;z-index:50}
.nav-lg h1{font-size:34px;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.1}
/* NAV — Compact */
.nav-c{
  padding:54px 16px 12px;background:rgba(253,249,243,.82);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--sep);display:flex;justify-content:space-between;align-items:flex-end;
  position:sticky;top:0;z-index:50;min-height:96px;
}
.nav-c h2{font-size:17px;font-weight:600;color:var(--ink);text-align:center;flex:1}
.nav-link{font-size:15px;color:var(--mint);background:none;border:none;font-family:var(--font);cursor:pointer;font-weight:500;min-height:44px;display:flex;align-items:center}
.nav-link:active{opacity:.4}
.nav-back{display:inline-flex;align-items:center;gap:3px;color:var(--mint);font-size:16px;background:none;border:none;cursor:pointer;font-family:var(--font);font-weight:500;min-height:44px;padding:0}
.nav-back:active{opacity:.4}

/* ═══ TAB BAR — 83px ═══ */
.tabbar{
  position:absolute;bottom:0;left:0;right:0;height:83px;z-index:100;
  background:rgba(253,249,243,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;cursor:pointer;padding:6px 0;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.tab:active{opacity:.4}
.tab svg{width:26px;height:26px}
.tab span{font-size:10px;color:var(--ink3);font-weight:500;transition:color .2s}
.tab.on span{color:var(--mint)}

/* ═══ GROUPED LIST — iOS ═══ */
.sec-h{font-size:13px;color:var(--ink2);padding:24px 20px 8px;font-weight:500;letter-spacing:.02em}
.group{background:var(--card);border-radius:14px;margin:0 16px 16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.row{display:flex;align-items:center;padding:0 16px;gap:12px;min-height:50px;cursor:pointer;position:relative;transition:background .1s}
.row:active{background:var(--cream2)}
.row+.row::before{content:'';position:absolute;top:0;left:56px;right:0;height:.5px;background:var(--sep)}
.row:first-child::before{left:16px}
.row-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.row-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.row-title{font-size:17px;color:var(--ink);font-weight:400;line-height:1.3}
.row-sub{font-size:13px;color:var(--ink2);margin-top:1px;line-height:1.3}
.row-val{font-size:17px;color:var(--ink3);font-weight:400;flex-shrink:0}
.row-chev{color:var(--ink4);font-size:14px;flex-shrink:0;margin-left:4px}

/* ═══ WELCOME ═══ */
.welcome{padding:72px 24px 32px;text-align:center;background:var(--cream);min-height:100%}
.w-icon{width:88px;height:88px;border-radius:24px;margin:0 auto 20px;background:var(--mint-l);display:flex;align-items:center;justify-content:center;font-size:42px}
.welcome h1{font-size:28px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.01em}
.welcome>p{font-size:17px;color:var(--ink2);margin-bottom:32px;line-height:1.5}
.w-form{text-align:left}
.field{margin-bottom:18px}
.f-label{font-size:13px;color:var(--ink2);margin-bottom:6px;padding:0 2px;font-weight:500;letter-spacing:.02em}
.f-input{
  width:100%;background:var(--card);border:1px solid var(--sep);border-radius:12px;
  padding:14px 16px;font-size:17px;color:var(--ink);font-family:var(--font);
  transition:border-color .2s;min-height:50px;
}
.f-input:focus{outline:none;border-color:var(--mint)}
.seg-wrap{display:flex;background:var(--cream2);border-radius:10px;padding:3px}
.seg{flex:1;text-align:center;padding:11px;border-radius:8px;font-size:15px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s;min-height:44px;display:flex;align-items:center;justify-content:center}
.seg.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tags{display:flex;flex-wrap:wrap;gap:10px}
.tag{padding:10px 18px;border-radius:22px;font-size:15px;background:var(--cream2);color:var(--ink2);cursor:pointer;transition:all .2s;font-weight:500;border:1.5px solid transparent;min-height:44px;display:flex;align-items:center}
.tag.on{background:var(--mint-xl);color:var(--mint);border-color:var(--mint-l)}
.btn-primary{
  width:100%;background:var(--mint);color:#fff;border:none;
  border-radius:14px;padding:16px;font-size:17px;font-weight:600;
  font-family:var(--font);cursor:pointer;margin-top:16px;transition:all .1s;min-height:54px;
}
.btn-primary:active{transform:scale(.98);opacity:.85}

/* ═══ HOME ═══ */
.home-head{display:flex;justify-content:space-between;align-items:center;padding:54px 20px 12px}
.chip{display:flex;align-items:center;gap:10px;padding:6px 16px 6px 6px;background:var(--card);border-radius:24px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);min-height:48px;transition:transform .1s}
.chip:active{transform:scale(.97)}
.chip-av{width:36px;height:36px;border-radius:50%;background:var(--peach-l);display:flex;align-items:center;justify-content:center;font-size:18px}
.chip-name{font-size:15px;font-weight:600;color:var(--ink)}
.chip-age{font-size:12px;color:var(--ink2)}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .1s}
.icon-btn:active{transform:scale(.9)}

/* Hero */
.hero{
  margin:4px 16px 16px;border-radius:18px;overflow:hidden;
  background:linear-gradient(135deg,var(--mint-l) 0%,var(--sky-l) 100%);
  padding:20px;cursor:pointer;transition:transform .15s;position:relative;
}
.hero:active{transform:scale(.98)}
.hero::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(255,255,255,.35),transparent);border-radius:50%}
.hero-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--mint);background:rgba(255,255,255,.65);padding:4px 12px;border-radius:8px;margin-bottom:10px;position:relative;z-index:1}
.hero-text{font-size:15px;color:var(--ink);line-height:1.65;position:relative;z-index:1}
.hero-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;font-size:15px;color:var(--mint);font-weight:600;position:relative;z-index:1;min-height:44px}

/* Quick Grid */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px 20px}
.qcard{background:var(--card);border-radius:16px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.03);min-height:100px;display:flex;flex-direction:column}
.qcard:active{transform:scale(.97);background:var(--cream2)}
.qcard-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.qcard-title{font-size:16px;font-weight:600;color:var(--ink)}
.qcard-desc{font-size:13px;color:var(--ink2);margin-top:3px}

/* AI Suggest */
.ai-row{
  margin:0 16px 20px;background:var(--card);border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.03);transition:all .15s;min-height:64px;
}
.ai-row:active{transform:scale(.98)}
.ai-av{width:42px;height:42px;border-radius:12px;background:var(--lav-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ai-text{flex:1}
.ai-q{font-size:16px;font-weight:500;color:var(--ink)}
.ai-hint{font-size:13px;color:var(--ink2);margin-top:2px;line-height:1.4}

/* ═══ SCHEDULE ═══ */
.tl{padding:4px 16px}
.tl-item{display:flex;gap:12px}
.tl-time{width:48px;text-align:right;padding-top:16px;flex-shrink:0;font-size:13px;color:var(--ink2);font-weight:500;font-variant-numeric:tabular-nums}
.tl-stem{width:1.5px;background:var(--cream3);position:relative;flex-shrink:0}
.tl-stem::after{content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--cream3)}
.tl-stem.now::after{background:var(--mint);box-shadow:0 0 0 4px rgba(126,200,184,.15)}
.tl-body{flex:1;padding:14px 16px;background:var(--card);border-radius:14px;margin:4px 0 12px;box-shadow:0 1px 4px rgba(0,0,0,.03);cursor:pointer;transition:transform .1s}
.tl-body:active{transform:scale(.98)}
.tl-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
.tl-desc{font-size:14px;color:var(--ink2);line-height:1.45}
.tl-tip{font-size:13px;color:var(--mint);margin-top:6px;font-weight:500}

/* ═══ SLEEP ═══ */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:4px 16px 20px}
.stat{background:var(--card);border-radius:16px;padding:18px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.stat-n{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat-l{font-size:13px;color:var(--ink2);margin-top:4px}
.ring-wrap{width:56px;height:56px;position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap circle{fill:none;stroke-linecap:round}
.ring-t{stroke:var(--cream3);stroke-width:5}
.ring-f{stroke:var(--ok);stroke-width:5;stroke-dasharray:157;stroke-dashoffset:157;transition:stroke-dashoffset 1.2s ease}
.ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--ink)}
.ai-card{margin:0 16px 20px;background:var(--card);border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.03);display:flex;gap:16px;align-items:center}
.ai-card-t{flex:1}
.ai-card-l{font-size:13px;color:var(--ink2);margin-bottom:4px}
.ai-card-s{font-size:18px;font-weight:700;color:var(--ok)}
.ai-card-d{font-size:14px;color:var(--ink2);margin-top:6px;line-height:1.5}

/* ═══ CHAT ═══ */
.chat-scroll{flex:1;overflow-y:auto;padding:16px 16px 8px;-webkit-overflow-scrolling:touch}
.chat-scroll::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;margin-bottom:16px;align-items:flex-end}
.msg.user{justify-content:flex-end}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-av.ai{background:var(--lav-l)}
.bubble{max-width:250px;padding:12px 16px;font-size:16px;line-height:1.55}
.msg.ai .bubble{background:var(--card);color:var(--ink);border-radius:18px 18px 18px 4px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.msg.user .bubble{background:var(--mint);color:#fff;border-radius:18px 18px 4px 18px}
.qpills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.qpill{padding:10px 16px;border-radius:20px;font-size:15px;background:var(--card);color:var(--ink);cursor:pointer;border:1px solid var(--sep);transition:all .15s;min-height:44px;display:flex;align-items:center}
.qpill:active{background:var(--cream2);transform:scale(.97)}
.typing{display:flex;gap:5px;padding:12px 16px;background:var(--card);border-radius:18px;width:fit-content;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--ink4);animation:tp 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-bar{
  padding:10px 14px;background:rgba(253,249,243,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:center;gap:10px;
}
.chat-field{flex:1;background:var(--card);border:1px solid var(--sep);border-radius:22px;padding:11px 18px;font-size:16px;font-family:var(--font);color:var(--ink);min-height:44px}
.chat-field:focus{outline:none;border-color:var(--mint-l)}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--mint);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .1s}
.send-btn:active{opacity:.5}
.send-btn svg{width:18px;height:18px;fill:#fff}

/* ═══ MILESTONES ═══ */
.ms-age{text-align:center;padding:20px 0 24px}
.ms-pill{display:inline-flex;align-items:baseline;gap:4px;background:var(--mint-l);border-radius:24px;padding:14px 32px}
.ms-pill .n{font-size:42px;font-weight:700;color:var(--mint);letter-spacing:-.03em}
.ms-pill .u{font-size:17px;color:var(--ink2);font-weight:500}
.ms-cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px 20px}
.ms-cat{background:var(--card);border-radius:16px;padding:16px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.03);transition:transform .1s}
.ms-cat:active{transform:scale(.97)}
.ms-cat-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.ms-cat-name{font-size:14px;color:var(--ink2);font-weight:500}
.ms-cat-num{font-size:24px;font-weight:700;color:var(--ink);margin-top:4px;letter-spacing:-.01em}
.ms-check{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ms-check.done{background:var(--ok)}
.ms-check.not{border:2px solid var(--ink4)}

/* ═══ PROFILE ═══ */
.prof-head{text-align:center;padding:56px 0 24px}
.prof-av{width:80px;height:80px;border-radius:50%;background:var(--peach-l);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 14px;box-shadow:0 4px 16px rgba(232,168,124,.15)}
.prof-name{font-size:24px;font-weight:700;color:var(--ink)}
.prof-sub{font-size:15px;color:var(--ink2);margin-top:4px}
.prof-edit{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 24px;background:var(--cream2);border-radius:22px;font-size:15px;color:var(--mint);font-weight:600;cursor:pointer;min-height:44px;transition:transform .1s}
.prof-edit:active{transform:scale(.95)}

/* ═══ ANIMATIONS ═══ */
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes rd{from{stroke-dashoffset:157}to{stroke-dashoffset:var(--rt,0)}}
.a-u{animation:fu .4s cubic-bezier(.25,.46,.45,.94) both}
.a-i{animation:fi .3s ease both}
.a-s{animation:si .35s cubic-bezier(.25,.46,.45,.94) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}

/* ═══ ENHANCED ANIMATIONS ═══ */
@keyframes breathe{0%,100%{box-shadow:0 1px 4px rgba(0,0,0,.03)}50%{box-shadow:0 4px 20px rgba(126,200,184,.18)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.12);opacity:.7}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes toastIn{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes ringDraw{from{stroke-dashoffset:157}to{stroke-dashoffset:var(--rt,0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideTab{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

.a-breathe{animation:breathe 4s ease-in-out infinite}
.a-float{animation:float 4s ease-in-out infinite}
.a-bounce{animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1)}
.a-toast{animation:toastIn 2.5s ease forwards}

.btn-shimmer{position:relative;overflow:hidden}
.btn-shimmer::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shimmer 3s ease-in-out infinite;
}

.card-press{transition:transform .15s,box-shadow .15s}
.card-press:active{transform:scale(.97)!important}

.tab-indicator{
  position:absolute;bottom:0;height:3px;border-radius:2px;
  background:var(--mint);transition:left .3s cubic-bezier(.34,1.56,.64,1);
}

.hero-glow{
  animation:breathe 4s ease-in-out infinite;
  border:1px solid rgba(126,200,184,.15);
}

.ai-float-bar{animation:float 5s ease-in-out infinite}

.toast-bar{
  position:absolute;top:56px;left:16px;right:16px;z-index:300;
  background:var(--ok);color:#fff;border-radius:12px;padding:10px 16px;
  font-size:13px;font-weight:600;text-align:center;
  animation:toastIn 2.5s ease forwards;box-shadow:0 4px 16px rgba(140,197,160,.3);
}

.ms-check.done{animation:bounceIn .35s cubic-bezier(.34,1.56,.64,1)}

.confetti-wrap{position:absolute;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-p{
  position:absolute;width:6px;height:6px;border-radius:2px;
  animation:confettiFall 1.2s ease forwards;
}
@keyframes confettiFall{

    <div className="screen" style={{background:'var(--cream)'}}>
      <div className="nav-c" style={{background:'rgba(253,249,243,.82)'}}>
        <div className="nav-back" onClick={()=>go('home')}>{ICO.back} 返回</div><h2>育儿助手</h2><div style={{width:44}}/>
      </div>
      <div className="chat-scroll">
        <div className="msg ai a-i d1"><div className="msg-av ai">🤖</div><div className="bubble">你好！我是豆豆的专属育儿顾问。有什么我能帮到你的吗？</div></div>
        {msgs.length===0&&<div className="qpills a-u d2">{['宝宝不爱吃饭','什么时候加辅食','夜醒频繁','出牙期注意事项','大运动发育','湿疹怎么办'].map(q=><div key={q} className="qpill" onClick={()=>send(q)}>{q}</div>)}</div>}
        {msgs.map((m,i)=><div key={i} className={`msg ${m.r} a-${m.r==='user'?'right':'left'}`}>{m.r==='ai'&&<div className="msg-av ai">🤖</div>}<div className="bubble" style={{whiteSpace:'pre-line'}}>{m.t}</div></div>)}
        {typing&&<div className="msg ai a-i"><div className="msg-av ai">🤖</div><div className="typing"><span/><span/><span/></div></div>}
        <div ref={end}/>
      </div>
      <div className="chat-bar">
        <input className="chat-field" placeholder="输入你的问题..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)}/>
        <button className="send-btn" onClick={()=>send(inp)}>{ICO.send}</button>
      </div>
    </div>
  );
}

/* ═══ MILESTONES ═══ */
function Milestones({go}){
  const[data,setData]=useState([
    {cat:'大运动',items:[{t:'扶站',done:true},{t:'独坐稳定',done:true},{t:'独站片刻',done:false},{t:'扶走',done:false}]},
    {cat:'语言',items:[{t:'叫"爸爸""妈妈"有指向',done:true},{t:'有意识说 3 个以上词汇',done:false}]},
    {cat:'认知',items:[{t:'能找到被遮住的物品',done:true},{t:'对镜子中的自己感兴趣',done:true},{t:'模仿简单动作',done:false}]},
  ]);
  const[conf,setConf]=useState([]);
  const toggle=(ci,ii)=>{setData(p=>{const n=[...p];n[ci]={...n[ci],items:[...n[ci].items]};n[ci].items[ii]={...n[ci].items[ii],done:!n[ci].items[ii].done};return n});
    const cols=['var(--mint)','var(--sky)','var(--peach)','var(--lav)','var(--rose)'];
    setConf(Array.from({length:20},(_,i)=>({id:Date.now()+i,c:cols[i%5],tx:(Math.random()-.5)*150,rot:Math.random()*540,d:Math.random()*.2})));
    setTimeout(()=>setConf([]),1200);
  };
  return(
    <div className="screen"><div className="scroll has-tab">
      <div className="nav-lg"><h1>发育里程碑</h1></div>
      <div className="ms-age a-s d1"><div className="ms-pill"><span className="n">10</span><span className="u">个月</span></div></div>
      <div className="ms-cats">
        {[{i:'🏃',n:'大运动',v:'2/4',bg:'var(--peach-xl)'},{i:'🗣️',n:'语言',v:'1/2',bg:'var(--sky-xl)'},{i:'🧠',n:'认知',v:'2/3',bg:'var(--lav-xl)'},{i:'🤝',n:'社交',v:'0/2',bg:'var(--mint-xl)'}].map((c,t)=>(
          <div key={t} className={`ms-cat a-s d${t+2}`}><div className="ms-cat-icon" style={{background:c.bg}}>{c.i}</div><div className="ms-cat-name">{c.n}</div><div className="ms-cat-num">{c.v}</div></div>
        ))}
      </div>
      {data.map((g,gi)=>(
        <React.Fragment key={gi}>
          <div className="sec-h a-i">{g.cat} · 10 个月</div>
          <div className="group a-u" style={{position:'relative'}}>
            {g.items.map((it,ii)=>(
              <div key={ii} className="row" onClick={()=>toggle(gi,ii)}>
                <div className={`ms-check ${it.done?'done a-bounce':'not'}`}>{it.done&&ICO.check}</div>
                <div className="row-body"><div className="row-title" style={it.done?{textDecoration:'line-through',color:'var(--ink3)'}:{}}>{it.t}</div></div>
              </div>
            ))}
            {conf.length>0&&gi===0&&<div className="confetti-wrap">{conf.map(c=><div key={c.id} className="confetti-p" style={{left:'50%',top:'30%',background:c.c,['--tx']:c.tx+'px',['--rot']:c.rot+'deg',animationDelay:c.d+'s'}}/>)}</div>}
          </div>
        </React.Fragment>
      ))}
    </div><Tab a="milestones" go={go}/></div>
  );
}

/* ═══ PROFILE ═══ */
function Profile({go}){
  return(
    <div className="screen"><div className="scroll has-tab">
      <div className="prof-head a-s d1"><div className="prof-av prof-ring">👶</div><div className="prof-name">豆豆</div><div className="prof-sub">10 个月 · 男 · 混合喂养 · 2025.07.15</div><div className="prof-edit">✏️ 编辑信息</div></div>
      <div className="sec-h a-i d2">孩子管理</div>
      <div className="group a-u d3">
        <div className="row"><div className="row-icon" style={{background:'var(--sky-xl)'}}>👶</div><div className="row-body"><div className="row-title">切换 / 管理孩子</div></div><span className="row-chev">›</span></div>
        <div className="row"><div className="row-icon" style={{background:'var(--mint-xl)'}}>➕</div><div className="row-body"><div className="row-title">添加新孩子</div></div><span className="row-chev">›</span></div>
      </div>
      <div className="sec-h a-i d4">偏好设置</div>
      <div className="group a-u d5">
        <div className="row"><div className="row-icon" style={{background:'var(--peach-xl)'}}>🏙️</div><div className="row-body"><div className="row-title">城市区域</div></div><div className="row-val">杭州 · 滨江区</div><span className="row-chev">›</span></div>
        <div className="row"><div className="row-icon" style={{background:'var(--lav-xl)'}}>🚇</div><div className="row-body"><div className="row-title">交通偏好</div></div><div className="row-val">地铁+打车</div><span className="row-chev">›</span></div>
        <div className="row"><div className="row-icon" style={{background:'var(--sky-xl)'}}>🔔</div><div className="row-body"><div className="row-title">提醒设置</div></div><div className="row-val">已开启</div><span className="row-chev">›</span></div>
      </div>
      <div className="sec-h a-i d6">数据与隐私</div>
      <div className="group a-u d7">
        <div className="row"><div className="row-icon" style={{background:'var(--mint-xl)'}}>📤</div><div className="row-body"><div className="row-title">导出数据</div></div><span className="row-chev">›</span></div>
        <div className="row"><div className="row-icon" style={{background:'var(--rose-xl)'}}>🗑️</div><div className="row-body"><div className="row-title" style={{color:'var(--err)'}}>清除所有数据</div></div></div>
      </div>
      <div style={{textAlign:'center',padding:'20px 0 40px',fontSize:13,color:'var(--ink4)'}}>BabyGrow v1.0 · AI 育儿助手</div>
    </div><Tab a="profile" go={go}/></div>
  );
}

/* ═══ TAB BAR ═══ */
function Tab({a,go}){
  const tabs=[{id:'home',on:ICO.homeA,off:ICO.home,l:'首页'},{id:'records',on:ICO.listA,off:ICO.list,l:'记录'},{id:'chat',on:ICO.chatA,off:ICO.chat,l:'AI 助手'},{id:'milestones',on:ICO.starA,off:ICO.star,l:'里程碑'},{id:'profile',on:ICO.userA,off:ICO.user,l:'我的'}];
  return(<div className="tabbar">{tabs.map(t=><div key={t.id} className={`tab ${a===t.id?'on':''}`} onClick={()=>go(t.id)}>{a===t.id?t.on:t.off}<span>{t.l}</span></div>)}</div>);
}

/* ═══ APP ═══ */
function App(){
  const[s,setS]=useState('welcome');const[k,setK]=useState(0);
  const go=v=>{if(v!==s){setS(v);setK(k=>k+1)}};
  const r=()=>{switch(s){
    case 'welcome':return <Welcome onDone={()=>go('home')}/>;
    case 'home':return <Home go={go}/>;
    case 'schedule':return <Schedule go={go}/>;
    case 'sleep':return <Sleep go={go}/>;
    case 'records':return <Records go={go}/>;
    case 'chat':return <Chat go={go}/>;
    case 'milestones':return <Milestones go={go}/>;
    case 'profile':return <Profile go={go}/>;
  }};
  return <div key={k} style={{position:'absolute',inset:0}}>{r()}</div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
