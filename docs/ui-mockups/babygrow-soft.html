<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BabyGrow · Soft Design</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ═══ SOFT PASTEL PALETTE ═══
     Inspired by Huckleberry + 宝妈审美研究.
     Low saturation, high lightness, warm cream base. */
  --mint:#7EC8B8;--mint-l:#D4EDE5;--mint-xl:#EDF7F3;
  --peach:#E8A87C;--peach-l:#F5DCC8;--peach-xl:#FDF0E6;
  --sky:#8BB8D6;--sky-l:#CEE0F0;--sky-xl:#EAF3FA;
  --lavender:#B5A3CC;--lavender-l:#DDD4EB;--lavender-xl:#F0EBF6;
  --rose:#D4A0A0;--rose-l:#F0D4D4;--rose-xl:#FAEAEA;
  --cream:#FDF9F3;--cream2:#F5EFE6;--cream3:#EDE6DA;
  --card:#FFFFFF;
  --ink:#3C3C3C;--ink2:#6E6E73;--ink3:#A0A0A5;--ink4:#C7C7CC;
  --sep:rgba(0,0,0,.06);
  --font:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  /* Semantic */
  --ok:#8CC5A0;--warn:#E8C76A;--err:#D48A8A;--info:#8BB8D6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{background:var(--cream2);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh}

/* ═══ DEVICE ═══ */
.device{position:relative;width:393px;height:852px;background:#1a1a1a;border-radius:55px;padding:11px 10px;
  box-shadow:0 40px 100px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.06)}
.screen{width:373px;height:830px;background:var(--cream);border-radius:45px;overflow:hidden;position:relative}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#1a1a1a;border-radius:20px;z-index:200}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:190;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 6px;pointer-events:none}
.sbar-t{font-size:15px;font-weight:600;color:var(--ink)}
.sbar-i{display:flex;gap:5px;align-items:center}
.home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--ink);border-radius:3px;opacity:.12;z-index:200}

/* ═══ LAYOUT ═══ */
.scr{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column}
.scr-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr-scroll::-webkit-scrollbar{display:none}
.scr-scroll.tab{padding-bottom:83px}

/* ═══ NAV ═══ */
.nav-lg{padding:56px 20px 8px;background:var(--cream);position:sticky;top:0;z-index:50}
.nav-lg h1{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.nav-bar{
  padding:56px 16px 10px;background:rgba(253,249,243,.8);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--sep);display:flex;justify-content:space-between;align-items:flex-end;
  position:sticky;top:0;z-index:50;
}
.nav-bar h2{font-size:17px;font-weight:600;color:var(--ink)}
.nav-link{font-size:15px;color:var(--mint);background:none;border:none;font-family:var(--font);cursor:pointer}
.nav-link:active{opacity:.5}
.nav-back{display:inline-flex;align-items:center;gap:2px;color:var(--mint);font-size:16px;background:none;border:none;cursor:pointer;font-family:var(--font);font-weight:500}
.nav-back:active{opacity:.5}

/* ═══ TAB BAR ═══ */
.tabbar{
  position:absolute;bottom:0;left:0;right:0;height:83px;z-index:100;
  background:rgba(253,249,243,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent}
.tab:active{opacity:.5}
.tab svg{width:24px;height:24px}
.tab span{font-size:10px;color:var(--ink3);font-weight:500;transition:color .2s}
.tab.on span{color:var(--mint)}

/* ═══ GROUPED LIST ═══ */
.sec-h{font-size:13px;color:var(--ink2);padding:20px 20px 6px;font-weight:500;letter-spacing:.02em}
.group{background:var(--card);border-radius:14px;margin:0 16px 16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.row{display:flex;align-items:center;padding:12px 16px;gap:12px;min-height:44px;cursor:pointer;position:relative}
.row:active{background:var(--cream2)}
.row+.row::before{content:'';position:absolute;top:0;left:52px;right:0;height:.5px;background:var(--sep)}
.row:first-child::before{left:16px}
.row-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.row-body{flex:1;min-width:0}
.row-title{font-size:16px;color:var(--ink);font-weight:500}
.row-sub{font-size:13px;color:var(--ink2);margin-top:1px}
.row-val{font-size:15px;color:var(--ink3)}
.row-chev{color:var(--ink4);font-size:14px}

/* ═══ WELCOME ═══ */
.welcome{padding:72px 24px 32px;text-align:center;background:var(--cream)}
.w-icon{
  width:80px;height:80px;border-radius:22px;margin:0 auto 20px;
  background:var(--mint-l);display:flex;align-items:center;justify-content:center;font-size:38px;
}
.welcome h1{font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.01em}
.welcome>p{font-size:16px;color:var(--ink2);margin-bottom:28px;line-height:1.5}
.w-form{text-align:left}
.field{margin-bottom:14px}
.f-label{font-size:13px;color:var(--ink2);margin-bottom:5px;padding:0 2px;font-weight:500}
.f-input{
  width:100%;background:var(--card);border:1px solid var(--sep);border-radius:12px;
  padding:12px 14px;font-size:16px;color:var(--ink);font-family:var(--font);
  transition:border-color .2s;
}
.f-input:focus{outline:none;border-color:var(--mint)}
/* Segmented */
.seg-wrap{display:flex;background:var(--cream2);border-radius:10px;padding:2px}
.seg{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:15px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s}
.seg.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.06)}
/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 16px;border-radius:20px;font-size:14px;background:var(--cream2);color:var(--ink2);cursor:pointer;transition:all .2s;font-weight:500;border:1.5px solid transparent}
.tag.on{background:var(--mint-xl);color:var(--mint);border-color:var(--mint-l)}
/* CTA */
.btn-mint{
  width:100%;background:var(--mint);color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:16px;font-weight:600;
  font-family:var(--font);cursor:pointer;margin-top:12px;transition:all .1s;
}
.btn-mint:active{transform:scale(.98);opacity:.85}

/* ═══ HOME ═══ */
.home-top{display:flex;justify-content:space-between;align-items:center;padding:56px 20px 8px}
.child-chip{display:flex;align-items:center;gap:10px;padding:6px 14px 6px 6px;background:var(--card);border-radius:22px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.child-chip:active{transform:scale(.97)}
.child-av{width:34px;height:34px;border-radius:50%;background:var(--peach-l);display:flex;align-items:center;justify-content:center;font-size:17px}
.child-name{font-size:15px;font-weight:600;color:var(--ink)}
.child-age{font-size:12px;color:var(--ink2)}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.icon-btn:active{background:var(--cream2)}

/* Hero card */
.hero{
  margin:14px 16px;border-radius:16px;overflow:hidden;
  background:linear-gradient(135deg,var(--mint-l) 0%,var(--sky-l) 100%);
  padding:20px;cursor:pointer;transition:transform .15s;position:relative;
}
.hero:active{transform:scale(.98)}
.hero::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(255,255,255,.4),transparent);border-radius:50%}
.hero-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--mint);background:rgba(255,255,255,.7);padding:3px 10px;border-radius:8px;margin-bottom:8px;position:relative;z-index:1}
.hero-text{font-size:15px;color:var(--ink);line-height:1.6;position:relative;z-index:1}
.hero-link{display:inline-block;margin-top:12px;font-size:14px;color:var(--mint);font-weight:600;position:relative;z-index:1}

/* Quick grid */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 16px}
.qcard{background:var(--card);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.qcard:active{transform:scale(.97);background:var(--cream2)}
.qcard-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.qcard-title{font-size:15px;font-weight:600;color:var(--ink)}
.qcard-desc{font-size:12px;color:var(--ink2);margin-top:2px}

/* AI row */
.ai-row{
  margin:0 16px 16px;background:var(--card);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.03);transition:all .15s;
}
.ai-row:active{transform:scale(.98)}
.ai-av{width:38px;height:38px;border-radius:12px;background:var(--lavender-l);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-text{flex:1}
.ai-q{font-size:15px;font-weight:500;color:var(--ink)}
.ai-hint{font-size:13px;color:var(--ink2);margin-top:2px}

/* ═══ SCHEDULE ═══ */
.tl{padding:4px 16px}
.tl-item{display:flex;gap:12px}
.tl-time{width:44px;text-align:right;padding-top:14px;flex-shrink:0;font-size:13px;color:var(--ink2);font-weight:500;font-variant-numeric:tabular-nums}
.tl-stem{width:1.5px;background:var(--cream3);position:relative;flex-shrink:0}
.tl-stem::after{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--cream3)}
.tl-stem.now::after{background:var(--mint);box-shadow:0 0 0 3px rgba(126,200,184,.2)}
.tl-body{flex:1;padding:12px 14px;background:var(--card);border-radius:12px;margin:4px 0 10px;box-shadow:0 1px 3px rgba(0,0,0,.03);cursor:pointer;transition:transform .1s}
.tl-body:active{transform:scale(.98)}
.tl-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:3px}
.tl-desc{font-size:13px;color:var(--ink2);line-height:1.4}
.tl-tip{font-size:12px;color:var(--mint);margin-top:4px;font-weight:500}

/* ═══ SLEEP ═══ */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:4px 16px 16px}
.stat-box{background:var(--card);border-radius:14px;padding:16px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.stat-num{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:12px;color:var(--ink2);margin-top:3px}
/* Ring */
.ring-wrap{width:52px;height:52px;position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap circle{fill:none;stroke-linecap:round}
.ring-track{stroke:var(--cream3);stroke-width:5}
.ring-fill{stroke:var(--ok);stroke-width:5;stroke-dasharray:150.8;stroke-dashoffset:150.8;transition:stroke-dashoffset 1.2s ease}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ink)}
.ai-card{margin:0 16px 16px;background:var(--card);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.03);display:flex;gap:14px;align-items:center}
.ai-card-info{flex:1}
.ai-card-lbl{font-size:12px;color:var(--ink2);margin-bottom:2px}
.ai-card-title{font-size:16px;font-weight:600;color:var(--ok)}
.ai-card-desc{font-size:13px;color:var(--ink2);margin-top:4px;line-height:1.4}

/* ═══ CHAT ═══ */
.chat-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.chat-scroll::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;margin-bottom:14px}
.msg.user{justify-content:flex-end}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg-av.ai{background:var(--lavender-l)}
.bubble{max-width:245px;padding:11px 14px;font-size:15px;line-height:1.55}
.msg.ai .bubble{background:var(--card);color:var(--ink);border-radius:16px 16px 16px 4px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg.user .bubble{background:var(--mint);color:#fff;border-radius:16px 16px 4px 16px}
.qpills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.qpill{padding:8px 14px;border-radius:18px;font-size:14px;background:var(--card);color:var(--ink);cursor:pointer;border:1px solid var(--sep);transition:all .15s}
.qpill:active{background:var(--cream2);transform:scale(.97)}
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--card);border-radius:16px;width:fit-content;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink4);animation:tp 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-bar{
  padding:8px 12px;background:rgba(253,249,243,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:center;gap:8px;
}
.chat-field{flex:1;background:var(--card);border:1px solid var(--sep);border-radius:20px;padding:9px 16px;font-size:15px;font-family:var(--font);color:var(--ink)}
.chat-field:focus{outline:none;border-color:var(--mint-l)}
.send-btn{width:32px;height:32px;border-radius:50%;background:var(--mint);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn:active{opacity:.5}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* ═══ MILESTONES ═══ */
.ms-age{text-align:center;padding:16px 0 20px}
.ms-pill{display:inline-flex;align-items:baseline;gap:2px;background:var(--mint-l);border-radius:20px;padding:12px 28px}
.ms-pill .n{font-size:38px;font-weight:700;color:var(--mint);letter-spacing:-.03em}
.ms-pill .u{font-size:16px;color:var(--ink2);font-weight:500}
.ms-cats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 16px}
.ms-cat{background:var(--card);border-radius:14px;padding:16px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:transform .1s}
.ms-cat:active{transform:scale(.97)}
.ms-cat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.ms-cat-name{font-size:13px;color:var(--ink2);font-weight:500}
.ms-cat-num{font-size:22px;font-weight:700;color:var(--ink);margin-top:2px}
.ms-check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ms-check.done{background:var(--ok)}
.ms-check.not{border:1.5px solid var(--ink4)}

/* ═══ PROFILE ═══ */
.prof-head{text-align:center;padding:56px 0 20px}
.prof-av{width:72px;height:72px;border-radius:50%;background:var(--peach-l);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px}
.prof-name{font-size:20px;font-weight:700;color:var(--ink)}
.prof-sub{font-size:14px;color:var(--ink2);margin-top:2px}
.prof-edit{display:inline-block;margin-top:10px;padding:7px 20px;background:var(--cream2);border-radius:20px;font-size:14px;color:var(--mint);font-weight:600;cursor:pointer}

/* ═══ ANIMATIONS ═══ */
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes rd{from{stroke-dashoffset:150.8}to{stroke-dashoffset:var(--rt,0)}}
.a-u{animation:fu .4s cubic-bezier(.25,.46,.45,.94) both}
.a-i{animation:fi .3s ease both}
.a-s{animation:si .35s cubic-bezier(.25,.46,.45,.94) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}.d7{animation-delay:.28s}.d8{animation-delay:.32s}
/* Confetti */
.cbox{position:absolute;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cp{position:absolute;width:6px;height:6px;border-radius:2px;animation:cf 1s ease forwards}
@keyframes cf{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}100%{opacity:0;transform:translate(var(--tx),180px) rotate(var(--rot)) scale(.2)}}
</style>
</head>
<body>
<div class="device">
<div class="screen">
  <div class="island"></div>
  <div class="sbar">
    <span class="sbar-t">9:41</span>
    <div class="sbar-i">
      <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="3" height="4" rx=".5" fill="#3C3C3C"/><rect x="4.5" y="4.5" width="3" height="6.5" rx=".5" fill="#3C3C3C"/><rect x="9" y="2" width="3" height="9" rx=".5" fill="#3C3C3C"/><rect x="13.5" y="0" width="2.5" height="11" rx=".5" fill="#3C3C3C"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="0" width="13" height="11" rx="2" stroke="#3C3C3C" stroke-width="1" fill="none"/><rect x="13.5" y="3.5" width="1.5" height="4" rx=".5" fill="#3C3C3C"/><rect x="1.5" y="1.5" width="10" height="8" rx="1" fill="#3C3C3C"/></svg>
    </div>
  </div>
  <div id="app"></div>
  <div class="home-bar"></div>
</div>
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* ═══ SVG ICONS ═══ */
const svg=(d,props={})=><svg viewBox="0 0 24 24" style={{width:props.sz||24,height:props.sz||24,fill:props.f?'none':'none',stroke:props.c||'currentColor','stroke-width':props.sw||1.8,'stroke-linecap':'round','stroke-linejoin':'round'}}><path d={d}/></svg>;
const ICO={
  home:svg("M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z"),
  homeF:<svg viewBox="0 0 24 24" style={{width:24,height:24,fill:'var(--mint)',stroke:'none'}}><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z"/></svg>,
  list:svg("M8 6h12M8 12h12M8 18h12",{c:'var(--ink3)'}),
  chat:svg("M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z",{c:'var(--ink3)'}),

function Cnt({to,dur=900}){const[v,setV]=useState(0);const r=useRef();useEffect(()=>{let s=null;const step=t=>{if(!s)s=t;const p=Math.min((t-s)/dur,1);setV(Math.round(p*to*10)/10);if(p<1)r.current=requestAnimationFrame(step)};r.current=requestAnimationFrame(step);return()=>cancelAnimationFrame(r.current)},[to,dur]);return<span>{v}</span>}

      <div className="sec-h a-i d6">数据</div>
      <div className="group a-u d7">
        <div className="row"><div className="row-icon" style={{background:'var(--cream2)'}}>📤</div><div className="row-body"><div className="row-title">导出数据</div></div><span className="row-chev">›</span></div>
        <div className="row"><div className="row-icon" style={{background:'var(--rose-xl)'}}>🗑️</div><div className="row-body"><div className="row-title" style={{color:'var(--err)'}}>清除所有数据</div></div></div>
      </div>
      <div style={{textAlign:'center',padding:'20px 0 40px',fontSize:13,color:'var(--ink4)'}}>BabyGrow v1.0</div>
    </div><Tab a="profile" go={go}/></div>
  );
}

/* ═══ TAB BAR ═══ */
function Tab({a,go}){
  const tabs=[{id:'home',on:ICO.homeA,off:ICO.home,l:'首页'},{id:'records',on:ICO.listA,off:ICO.list,l:'记录'},{id:'chat',on:ICO.chatA,off:ICO.chat,l:'AI 助手'},{id:'milestones',on:ICO.starA,off:ICO.star,l:'里程碑'},{id:'profile',on:ICO.userA,off:ICO.user,l:'我的'}];
  return(<div className="tabbar">{tabs.map(t=><div key={t.id} className={`tab ${a===t.id?'on':''}`} onClick={()=>go(t.id)}>{a===t.id?t.on:t.off}<span>{t.l}</span></div>)}</div>);
}

/* ═══ APP ═══ */
function App(){
  const[s,setS]=useState('welcome');const[k,setK]=useState(0);
  const go=v=>{if(v!==s){setS(v);setK(k=>k+1)}};
  const r=()=>{
    switch(s){
      case 'welcome':return <Welcome onDone={()=>go('home')}/>;
      case 'home':return <Home go={go}/>;
      case 'schedule':return <Schedule go={go}/>;
      case 'sleep':return <Sleep go={go}/>;
      case 'records':return <Records go={go}/>;
      case 'chat':return <Chat go={go}/>;
      case 'milestones':return <Milestones go={go}/>;
      case 'profile':return <Profile go={go}/>;
    }
  };
  return <div key={k} style={{position:'absolute',inset:0}}>{r()}</div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
