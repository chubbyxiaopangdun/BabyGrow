<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BabyGrow · Apple Design v2</title>
<style>
/* ═══════════════ APPLE ACTUAL DESIGN TOKENS ═══════════════ */
:root{
  /* Apple doesn't pick "brand colors" for the UI chrome.
     The UI is black, white, gray. Color is data/status only. */
  --white:#FFFFFF;
  --black:#000000;
  /* Apple gray scale — not warm, not cool, just neutral */
  --g1:#1C1C1E;--g2:#3A3A3C;--g3:#636366;--g4:#8E8E93;
  --g5:#AEAEB2;--g6:#C7C7CC;--g7:#D1D1D6;--g8:#E5E5EA;--g9:#F2F2F7;
  --g95:#F9F9FB;--g99:#FAFAFA;
  /* System colors — used ONLY for data/status, never for UI chrome */
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;
  --teal:#5AC8FA;--purple:#AF52DE;--pink:#FF2D55;
  /* A single warm tone for baby-brand moments — used sparingly */
  --brand:#FF6B35;--brand-soft:rgba(255,107,53,0.08);
  /* Surfaces */
  --bg:var(--white);--card:var(--white);--grouped:var(--g9);
  /* Typography */
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue','PingFang SC','Noto Sans SC',sans-serif;
  /* Spacing — 8pt grid */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--s10:40px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{background:#000;font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh}

/* ═══════════════ DEVICE FRAME ═══════════════ */
.device{position:relative;width:393px;height:852px;background:#000;border-radius:55px;padding:11px 10px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 50px 120px rgba(0,0,0,.85)}
.device-screen{width:373px;height:830px;background:var(--bg);border-radius:45px;overflow:hidden;position:relative}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:200}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:190;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 6px;pointer-events:none}
.sbar-t{font-size:15px;font-weight:600;color:var(--black);letter-spacing:.01em}
.sbar-i{display:flex;gap:5px;align-items:center}
.home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--black);border-radius:3px;opacity:.15;z-index:200}

/* ═══════════════ SCREEN SYSTEM ═══════════════ */
.scr{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column}
.scr-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr-scroll::-webkit-scrollbar{display:none}
.scr-scroll.with-tab{padding-bottom:83px}

/* ═══════════════ APPLE NAV BAR ═══════════════ */
/* Large title — iOS 11+ style */
.nav-large{padding:56px var(--s5) 6px;background:var(--white);position:sticky;top:0;z-index:50}
.nav-large h1{font-size:34px;font-weight:700;color:var(--black);letter-spacing:-.02em;line-height:1.15}
/* Compact nav — for pushed screens */
.nav-compact{
  padding:56px var(--s4) 10px;
  background:rgba(255,255,255,.72);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--g8);
  display:flex;justify-content:space-between;align-items:flex-end;
  position:sticky;top:0;z-index:50;
}
.nav-compact h2{font-size:17px;font-weight:600;color:var(--black)}
.nav-link{font-size:17px;color:var(--blue);background:none;border:none;font-family:var(--font);cursor:pointer;padding:0}
.nav-link:active{opacity:.4}
.nav-back{display:inline-flex;align-items:center;gap:1px;color:var(--blue);font-size:17px;background:none;border:none;cursor:pointer;font-family:var(--font)}
.nav-back:active{opacity:.4}
.nav-back svg{width:10px;height:18px}

/* ═══════════════ APPLE TAB BAR ═══════════════ */
.tabbar{
  position:absolute;bottom:0;left:0;right:0;height:83px;z-index:100;
  background:rgba(249,249,249,.78);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--g8);
  display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:64px;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent}
.tab:active{opacity:.4}
.tab svg{width:24px;height:24px}
.tab span{font-size:10px;color:var(--g4);font-weight:500;transition:color .15s}
.tab.on span{color:var(--brand)}

/* ═══════════════ APPLE GROUPED LIST ═══════════════ */
.section-header{
  font-size:13px;color:var(--g3);padding:var(--s6) var(--s6) var(--s2);
  text-transform:uppercase;letter-spacing:.06em;font-weight:400;
}
.section-footer{font-size:13px;color:var(--g4);padding:var(--s2) var(--s6) var(--s5);line-height:1.45}
.group{background:var(--card);border-radius:12px;margin:0 var(--s4) var(--s4);overflow:hidden}
.row{
  display:flex;align-items:center;padding:11px 16px;min-height:44px;gap:var(--s3);
  cursor:pointer;position:relative;
}
.row:active{background:var(--g9)}
.row+.row::before{content:'';position:absolute;top:0;left:52px;right:0;height:.5px;background:var(--g8)}
.row:first-child::before{left:16px}
.row-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.row-body{flex:1;min-width:0}
.row-title{font-size:17px;color:var(--black)}
.row-sub{font-size:13px;color:var(--g3);margin-top:1px}
.row-val{font-size:17px;color:var(--g3)}
.row-chev{color:var(--g6);font-size:14px;font-weight:600}

/* ═══════════════ CARD ═══════════════ */
.card{background:var(--card);border-radius:16px;margin:0 var(--s4) var(--s3);padding:var(--s4);box-shadow:0 .5px 0 var(--g8)}

/* ═══════════════ WELCOME ═══════════════ */
.welcome{padding:72px var(--s6) var(--s6);text-align:center;background:var(--white)}
.welcome-icon{
  width:80px;height:80px;border-radius:20px;margin:0 auto var(--s5);
  background:var(--g9);display:flex;align-items:center;justify-content:center;font-size:40px;
}
.welcome h1{font-size:28px;font-weight:700;color:var(--black);letter-spacing:-.02em;margin-bottom:var(--s2)}
.welcome>p{font-size:17px;color:var(--g3);margin-bottom:var(--s8);line-height:1.4}
.w-form{text-align:left}
.field{margin-bottom:var(--s4)}
.field-label{font-size:13px;color:var(--g3);margin-bottom:var(--s1);padding:0 4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.field-input{
  width:100%;background:var(--g9);border:none;border-radius:10px;
  padding:12px var(--s4);font-size:17px;color:var(--black);font-family:var(--font);
}
.field-input:focus{outline:none;box-shadow:0 0 0 3px rgba(0,122,255,.2)}
.field-row{display:flex;gap:var(--s3)}
.field-row .field{flex:1}
/* Segmented Control — actual iOS style */
.segmented{
  display:flex;background:var(--g8);border-radius:9px;padding:2px;
}
.seg{
  flex:1;text-align:center;padding:8px;border-radius:7px;font-size:15px;
  font-weight:500;color:var(--g2);cursor:pointer;transition:all .2s;
}
.seg.on{background:var(--white);color:var(--black);box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:var(--s2)}
.tag{
  padding:7px 14px;border-radius:20px;font-size:15px;
  background:var(--g9);color:var(--g3);cursor:pointer;transition:all .15s;font-weight:500;
}
.tag.on{background:var(--brand);color:var(--white)}
/* Primary Button — Apple blue or brand */
.btn-primary{
  width:100%;background:var(--brand);color:var(--white);border:none;
  border-radius:var(--s3);padding:var(--s4);font-size:17px;font-weight:600;
  font-family:var(--font);cursor:pointer;margin-top:var(--s3);transition:all .1s;
}
.btn-primary:active{transform:scale(.98);opacity:.85}
.btn-blue{
  width:100%;background:var(--blue);color:var(--white);border:none;
  border-radius:var(--s3);padding:var(--s4);font-size:17px;font-weight:600;
  font-family:var(--font);cursor:pointer;margin-top:var(--s3);transition:all .1s;
}
.btn-blue:active{transform:scale(.98);opacity:.85}

/* ═══════════════ HOME ═══════════════ */
.home-top{display:flex;justify-content:space-between;align-items:center;padding:56px var(--s5) var(--s2)}
.child-chip{
  display:flex;align-items:center;gap:var(--s3);
  padding:5px 14px 5px 5px;background:var(--g9);border-radius:20px;cursor:pointer;
}
.child-chip:active{background:var(--g8)}
.child-av{width:32px;height:32px;border-radius:50%;background:var(--g8);display:flex;align-items:center;justify-content:center;font-size:16px}
.child-name{font-size:15px;font-weight:600;color:var(--black)}
.child-age{font-size:12px;color:var(--g3)}
.icon-btn{width:32px;height:32px;border-radius:50%;background:var(--g9);display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn:active{background:var(--g8)}

/* Hero */
.hero{
  margin:var(--s4);border-radius:var(--s4);overflow:hidden;
  background:var(--g9);padding:var(--s5);cursor:pointer;transition:transform .15s;
}
.hero:active{transform:scale(.98)}
.hero-label{font-size:13px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:var(--s2)}
.hero-text{font-size:15px;color:var(--black);line-height:1.55}
.hero-link{display:inline-block;margin-top:var(--s3);font-size:15px;color:var(--blue);font-weight:500}

/* Quick Grid — minimal */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin:0 var(--s4) var(--s4)}
.qcard{
  background:var(--g9);border-radius:var(--s4);padding:var(--s4);
  cursor:pointer;transition:all .15s;
}
.qcard:active{background:var(--g8);transform:scale(.97)}
.qcard-icon{font-size:24px;margin-bottom:var(--s2)}
.qcard-title{font-size:15px;font-weight:600;color:var(--black)}
.qcard-desc{font-size:13px;color:var(--g3);margin-top:2px}

/* AI suggest */
.ai-row{
  margin:0 var(--s4) var(--s4);background:var(--g9);border-radius:var(--s4);
  padding:var(--s4);display:flex;align-items:center;gap:var(--s3);cursor:pointer;
}
.ai-row:active{background:var(--g8)}
.ai-av{width:36px;height:36px;border-radius:10px;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 .5px 0 var(--g8)}
.ai-row-text{flex:1}
.ai-row-q{font-size:15px;font-weight:500;color:var(--black)}
.ai-row-hint{font-size:13px;color:var(--g3);margin-top:1px}

/* ═══════════════ SCHEDULE ═══════════════ */
.timeline{padding:var(--s2) var(--s4)}
.tl-item{display:flex;gap:var(--s3)}
.tl-left{width:46px;text-align:right;padding-top:14px;flex-shrink:0}
.tl-time{font-size:13px;color:var(--g3);font-weight:500;font-variant-numeric:tabular-nums}
.tl-stem{width:1.5px;background:var(--g8);position:relative;flex-shrink:0}
.tl-stem::after{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--g6)}
.tl-stem.now::after{background:var(--brand);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
.tl-body{flex:1;padding:var(--s3) var(--s4);background:var(--card);border-radius:12px;margin:4px 0 var(--s2);box-shadow:0 .5px 0 var(--g8);cursor:pointer;transition:transform .1s}
.tl-body:active{transform:scale(.98)}
.tl-title{font-size:15px;font-weight:600;color:var(--black);margin-bottom:2px}
.tl-desc{font-size:13px;color:var(--g3);line-height:1.4}
.tl-tip{font-size:12px;color:var(--green);margin-top:4px;font-weight:500}

/* ═══════════════ SLEEP ═══════════════ */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--s3);margin:var(--s2) var(--s4) var(--s4)}
.stat-box{background:var(--g9);border-radius:var(--s4);padding:var(--s4) var(--s3);text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--black);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:12px;color:var(--g3);margin-top:2px}
/* Ring — SVG animated */
.ring-wrap{width:52px;height:52px;position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap circle{fill:none;stroke-linecap:round}
.ring-track{stroke:var(--g8);stroke-width:5}
.ring-fill{stroke:var(--green);stroke-width:5;stroke-dasharray:150.8;stroke-dashoffset:150.8;transition:stroke-dashoffset 1.2s cubic-bezier(.25,.46,.45,.94)}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--black)}

/* ═══════════════ CHAT ═══════════════ */
.chat-scroll{flex:1;overflow-y:auto;padding:var(--s4);-webkit-overflow-scrolling:touch}
.chat-scroll::-webkit-scrollbar{display:none}
.msg{display:flex;gap:var(--s2);margin-bottom:var(--s4)}
.msg.user{justify-content:flex-end}
.msg-av{width:28px;height:28px;border-radius:50%;background:var(--g9);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bubble{max-width:250px;padding:10px 14px;font-size:15px;line-height:1.5}
.msg.ai .bubble{background:var(--g9);color:var(--black);border-radius:18px 18px 18px 4px}
.msg.user .bubble{background:var(--blue);color:var(--white);border-radius:18px 18px 4px 18px}
.qpills{display:flex;flex-wrap:wrap;gap:var(--s2);margin-bottom:var(--s4)}
.qpill{padding:7px 14px;border-radius:18px;font-size:14px;background:var(--g9);color:var(--black);cursor:pointer;transition:all .1s;border:.5px solid var(--g8)}
.qpill:active{background:var(--g8);transform:scale(.97)}
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--g9);border-radius:18px;width:fit-content;margin-bottom:var(--s4)}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--g5);animation:tp 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-bar{
  padding:8px 12px;
  background:rgba(249,249,249,.78);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--g8);display:flex;align-items:center;gap:var(--s2);
}
.chat-field{flex:1;background:var(--card);border:none;border-radius:20px;padding:9px 16px;font-size:15px;font-family:var(--font);box-shadow:0 .5px 0 var(--g8)}
.chat-field:focus{outline:none;box-shadow:0 0 0 3px rgba(0,122,255,.15),0 .5px 0 var(--g8)}
.send-btn{width:30px;height:30px;border-radius:50%;background:var(--blue);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn:active{opacity:.5}

/* ═══════════════ MILESTONES ═══════════════ */
.ms-hero{text-align:center;padding:20px 0 24px}
.ms-pill{display:inline-flex;align-items:baseline;gap:2px;background:var(--g9);border-radius:20px;padding:10px 28px}
.ms-pill .n{font-size:40px;font-weight:700;color:var(--black);letter-spacing:-.03em}
.ms-pill .u{font-size:15px;color:var(--g3);font-weight:500}
.ms-cats{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin:0 var(--s4) var(--s4)}
.ms-cat{background:var(--g9);border-radius:var(--s4);padding:var(--s4);cursor:pointer;transition:transform .1s}
.ms-cat:active{transform:scale(.97)}
.ms-cat-icon{font-size:20px;margin-bottom:var(--s2)}
.ms-cat-name{font-size:13px;color:var(--g3);font-weight:500}
.ms-cat-num{font-size:22px;font-weight:700;color:var(--black);letter-spacing:-.02em;margin-top:2px}
.ms-check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ms-check.done{background:var(--green)}
.ms-check.not{border:1.5px solid var(--g6)}

/* ═══════════════ PROFILE ═══════════════ */
.profile-head{text-align:center;padding:56px 0 var(--s5)}
.profile-av{width:72px;height:72px;border-radius:50%;background:var(--g8);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto var(--s3)}
.profile-name{font-size:22px;font-weight:700;color:var(--black)}
.profile-sub{font-size:15px;color:var(--g3);margin-top:2px}
.profile-edit{
  display:inline-block;margin-top:var(--s3);padding:7px 20px;
  background:var(--g9);border-radius:20px;font-size:15px;color:var(--blue);
  cursor:pointer;font-weight:500;
}
.profile-edit:active{background:var(--g8)}

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes ringDraw{from{stroke-dashoffset:150.8}to{stroke-dashoffset:var(--ring-target,0)}}
.a-up{animation:fadeInUp .4s cubic-bezier(.25,.46,.45,.94) both}
.a-in{animation:fadeIn .3s ease both}
.a-scale{animation:scaleIn .35s cubic-bezier(.25,.46,.45,.94) both}
.a-right{animation:slideRight .35s cubic-bezier(.25,.46,.45,.94) both}
.a-left{animation:slideLeft .35s cubic-bezier(.25,.46,.45,.94) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}
.d5{animation-delay:.2s}.d6{animation-delay:.24s}.d7{animation-delay:.28s}.d8{animation-delay:.32s}

/* ═══════════════ CONFETTI ═══════════════ */
.confetti-box{position:absolute;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-p{position:absolute;width:6px;height:6px;border-radius:1.5px;animation:cf 1s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes cf{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}100%{opacity:0;transform:translate(var(--tx),200px) rotate(var(--rot)) scale(.2)}}
</style>
</head>
<body>
<div class="device">
<div class="device-screen">
  <div class="island"></div>
  <div class="sbar">
    <span class="sbar-t">9:41</span>
    <div class="sbar-i">
      <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="3" height="4" rx=".5" fill="#000"/><rect x="4.5" y="4.5" width="3" height="6.5" rx=".5" fill="#000"/><rect x="9" y="2" width="3" height="9" rx=".5" fill="#000"/><rect x="13.5" y="0" width="2.5" height="11" rx=".5" fill="#000"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="0" width="13" height="11" rx="2" stroke="#000" stroke-width="1" fill="none"/><rect x="13.5" y="3.5" width="1.5" height="4" rx=".5" fill="#000"/><rect x="1.5" y="1.5" width="10" height="8" rx="1" fill="#000"/></svg>
    </div>
  </div>
  <div id="app"></div>
  <div class="home-bar"></div>
</div>
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* SVG icons — thin stroke, SF Symbols style */
const I=({d,sz=24,c='currentColor',sw=1.8,fw})=>{
  const st={width:sz,height:sz,fill:fw?c:'none',stroke:c,'stroke-width':sw,'stroke-linecap':'round','stroke-linejoin':'round'};
  return <svg viewBox="0 0 24 24" style={st}><path d={d}/></svg>;
};

/* Count up */
function Cnt({to,dur=900}){
  const[v,setV]=useState(0);const r=useRef();
  useEffect(()=>{let s=null;const step=t=>{if(!s)s=t;const p=Math.min((t-s)/dur,1);setV(Math.round(p*to*10)/10);if(p<1)r.current=requestAnimationFrame(step)};r.current=requestAnimationFrame(step);return()=>cancelAnimationFrame(r.current)},[to,dur]);
  return <span>{v}</span>;
}

                <div key={ii} className={`row ${it.done?'done':''}`} onClick={()=>toggle(gi,ii)}>
                  <div className={`ms-check ${it.done?'done':'not'}`}>{it.done&&ICO.check}</div>
                  <div className="row-body"><div className="row-title" style={it.done?{textDecoration:'line-through',color:'var(--g4)'}:{}}>{it.t}</div></div>
                </div>
              ))}
              {conf.length>0&&gi===0&&<div className="confetti-box">{conf.map(c=><div key={c.id} className="confetti-p" style={{left:'50%',top:'30%',background:c.c,['--tx']:c.tx+'px',['--rot']:c.rot+'deg',animationDelay:c.d+'s'}}/>)}</div>}
            </div>
          </React.Fragment>
        ))}
      </div>
      <Tab active="milestones" go={go}/>
    </div>
  );
}

/* ═══════════════ PROFILE ═══════════════ */
function Profile({go}){
  return(
    <div className="scr">
      <div className="scr-scroll with-tab">
        <div className="profile-head a-scale d1">
          <div className="profile-av">👶</div>
          <div className="profile-name">豆豆</div>
          <div className="profile-sub">10 个月 · 男 · 混合喂养</div>
          <div className="profile-edit">编辑信息</div>
        </div>
        <div className="section-header a-in d2">孩子管理</div>
        <div className="group a-up d3">
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>👶</div><div className="row-body"><div className="row-title">切换 / 管理孩子</div></div><span className="row-chev">›</span></div>
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>➕</div><div className="row-body"><div className="row-title">添加新孩子</div></div><span className="row-chev">›</span></div>
        </div>
        <div className="section-header a-in d4">设置</div>
        <div className="group a-up d5">
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>🏙️</div><div className="row-body"><div className="row-title">城市区域</div></div><div className="row-val">杭州</div><span className="row-chev">›</span></div>
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>🚇</div><div className="row-body"><div className="row-title">交通偏好</div></div><div className="row-val">地铁+打车</div><span className="row-chev">›</span></div>
        </div>
        <div className="section-header a-in d6">数据</div>
        <div className="group a-up d7">
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>📤</div><div className="row-body"><div className="row-title">导出数据</div></div><span className="row-chev">›</span></div>
          <div className="row"><div className="row-icon" style={{background:'var(--g9)'}}>🗑️</div><div className="row-body"><div className="row-title" style={{color:'var(--red)'}}>清除所有数据</div></div></div>
        </div>
        <div style={{textAlign:'center',padding:'20px 0 40px',fontSize:13,color:'var(--g5)'}}>BabyGrow v1.0</div>
      </div>
      <Tab active="profile" go={go}/>
    </div>
  );
}

/* ═══════════════ TAB BAR ═══════════════ */
function Tab({active,go}){
  const tabs=[
    {id:'home',icon:ICO.home,iconF:ICO.homeF,label:'首页'},
    {id:'records',icon:ICO.list,iconF:ICO.listF,label:'记录'},
    {id:'chat',icon:ICO.chat,iconF:ICO.chatF,label:'AI 助手'},
    {id:'milestones',icon:ICO.star,iconF:ICO.starF,label:'里程碑'},
    {id:'profile',icon:ICO.user,iconF:ICO.userF,label:'我的'},
  ];
  return(
    <div className="tabbar">
      {tabs.map(t=>(
        <div key={t.id} className={`tab ${active===t.id?'on':''}`} onClick={()=>go(t.id)}>
          {active===t.id?t.iconF:t.icon}
          <span>{t.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App(){
  const[scr,setScr]=useState('welcome');const[key,setKey]=useState(0);
  const go=s=>{if(s!==scr){setScr(s);setKey(k=>k+1)}};
  const render=()=>{
    switch(scr){
      case 'welcome':return <Welcome onDone={()=>go('home')}/>;
      case 'home':return <Home go={go}/>;
      case 'schedule':return <Schedule go={go}/>;
      case 'sleep':return <Sleep go={go}/>;
      case 'records':return <Records go={go}/>;
      case 'chat':return <Chat go={go}/>;
      case 'milestones':return <Milestones go={go}/>;
      case 'profile':return <Profile go={go}/>;
    }
  };
  return <div key={key} style={{position:'absolute',inset:0}}>{render()}</div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
